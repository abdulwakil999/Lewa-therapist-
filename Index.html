<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="description" content="LEWA — a warm, evidence-based AI therapy companion. Private, always available, and built to help you feel heard."/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23004643'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle'%3E🌿%3C/text%3E%3C/svg%3E"/>
<title>LEWA Therapist</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;700&display=swap"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
/* ── FONTS ── */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;700&display=swap');

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:-webkit-fill-available}
body{height:100dvh;min-height:-webkit-fill-available;overflow:hidden;font-family:'Lato',sans-serif;background:#001a19;color:#F0EDE5}
#root{height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ── VARIABLES ── */
:root{
  --bg:   #001a19;
  --surf: #002221;
  --card: rgba(0,38,36,0.93);
  --bdr:  rgba(240,237,229,0.08);
  --bact: rgba(240,237,229,0.22);

  --cy:   #004643;
  --cy-l: #006b65;
  --cy-ll:#008f87;

  --sd:   #F0EDE5;
  --sd-d: rgba(240,237,229,0.68);
  --sd-m: rgba(240,237,229,0.42);
  --sd-x: rgba(240,237,229,0.2);
  --sd-xx:rgba(240,237,229,0.1);

  --warm: #b8956a;
  --warm-l:#d4b48a;

  --t1:#F0EDE5;
  --t2:rgba(240,237,229,0.68);
  --t3:rgba(240,237,229,0.42);
  --t4:rgba(240,237,229,0.2);
}

/* ── AURORA ── */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.aurora span{position:absolute;border-radius:50%;filter:blur(100px)}
.aurora span:nth-child(1){width:560px;height:560px;background:radial-gradient(circle,rgba(0,107,101,.28)0%,transparent 70%);top:-180px;left:-180px;animation:au1 22s ease-in-out infinite}
.aurora span:nth-child(2){width:480px;height:480px;background:radial-gradient(circle,rgba(0,70,67,.22)0%,transparent 70%);bottom:-140px;right:-140px;animation:au2 28s ease-in-out infinite}
.aurora span:nth-child(3){width:400px;height:400px;background:radial-gradient(circle,rgba(0,143,135,.12)0%,transparent 70%);top:35%;left:35%;animation:au3 34s ease-in-out infinite}
.aurora span:nth-child(4){width:320px;height:320px;background:radial-gradient(circle,rgba(240,237,229,.04)0%,transparent 70%);top:15%;right:8%;animation:au4 20s ease-in-out infinite}
@keyframes au1{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(70px,55px) scale(1.12)}70%{transform:translate(-35px,80px) scale(.92)}}
@keyframes au2{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-60px,-45px) scale(1.18)}70%{transform:translate(50px,-70px) scale(.94)}}
@keyframes au3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.35)}}
@keyframes au4{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,35px)}}

/* ── APP ── */
.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative;z-index:1}

/* ── KEYFRAMES ── */
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}

/* ── BUTTON SPRING PRESS (not AI-generated feeling) ── */
@keyframes spring-release{
  0%  {transform:scale(.955) translateY(2px)}
  55% {transform:scale(1.018) translateY(-1px)}
  75% {transform:scale(.995)}
  100%{transform:scale(1) translateY(0)}
}
@keyframes tap-flash{
  0%  {background-color:rgba(240,237,229,.08)}
  100%{background-color:transparent}
}

/* ── CENTERED SCREENS ── */
.screen-center{flex:1;display:flex;align-items:center;justify-content:center;padding:1.2rem;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:2}
.card{background:var(--card);backdrop-filter:blur(28px);border:1px solid var(--bdr);border-radius:22px;padding:2.4rem 2.2rem;width:100%;max-width:500px;box-shadow:0 24px 64px rgba(0,0,0,.45)}

/* ── EMBLEM ── */
.emblem{width:72px;height:72px;background:linear-gradient(135deg,var(--cy),var(--cy-ll));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1.3rem;animation:breathe 4s ease-in-out infinite,float 6s ease-in-out infinite;border:1.5px solid rgba(240,237,229,.12)}

/* ── TYPOGRAPHY ── */
.lewa-title{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:400;color:var(--sd);letter-spacing:.02em;text-align:center;line-height:1.05}
.lewa-title em{font-style:italic;color:var(--cy-ll)}
.lewa-sub{text-align:center;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--sd-m);margin:.45rem 0 1.5rem;font-weight:700}
.lewa-desc{color:var(--t3);font-size:.88rem;line-height:1.75;text-align:center;margin-bottom:1.6rem}

/* ── FORM ── */
.field-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sd-m);margin-bottom:.32rem;display:block;font-weight:700}
.inp{width:100%;background:rgba(240,237,229,.05);border:1px solid var(--bdr);border-radius:9px;padding:.72rem .95rem;color:var(--t1);font-family:'Lato',sans-serif;font-size:.9rem;outline:none;transition:border-color .18s,box-shadow .18s,background .18s;margin-bottom:.72rem;resize:none;line-height:1.55}
.inp::placeholder{color:var(--t4)}
.inp:focus{border-color:var(--cy-l);box-shadow:0 0 0 3px rgba(0,107,101,.18);background:rgba(240,237,229,.07)}
select.inp option{background:#002221;color:var(--sd)}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:.84rem;background:var(--cy);border:1px solid rgba(240,237,229,.12);border-radius:10px;color:var(--sd);font-family:'Lato',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;display:block;margin-top:.4rem;position:relative;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.3),0 1px 0 rgba(240,237,229,.08) inset;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),box-shadow .18s ease,filter .15s ease}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(240,237,229,.07)0%,transparent 55%);pointer-events:none}
.btn-primary:not(:disabled):hover{background:var(--cy-l);box-shadow:0 6px 22px rgba(0,0,0,.35),0 1px 0 rgba(240,237,229,.1) inset}
.btn-primary:not(:disabled):active{
  transform:scale(.955) translateY(2px)!important;
  box-shadow:0 1px 4px rgba(0,0,0,.45),inset 0 1px 3px rgba(0,0,0,.2)!important;
  filter:brightness(.88);
  transition:transform .07s ease,box-shadow .07s ease,filter .07s ease!important}
.btn-primary.springing{animation:spring-release .5s cubic-bezier(.34,1.56,.64,1) both}
.btn-primary:disabled{opacity:.36;cursor:not-allowed}

.btn-back{background:transparent;border:1px solid var(--bdr);border-radius:8px;padding:.44rem .9rem;color:var(--t2);font-family:'Lato',sans-serif;font-size:.8rem;cursor:pointer;font-weight:700;letter-spacing:.04em;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),border-color .18s,color .18s,background .18s}
.btn-back:hover{border-color:var(--bact);color:var(--t1);background:rgba(240,237,229,.06)}
.btn-back:active{transform:scale(.93) translateY(1px);transition:transform .07s ease!important}

.btn-cont{background:var(--cy);border:1px solid rgba(240,237,229,.12);border-radius:9px;padding:.6rem 1.5rem;color:var(--sd);font-family:'Lato',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.28);
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),box-shadow .18s ease,filter .15s ease}
.btn-cont:not(:disabled):hover{background:var(--cy-l);box-shadow:0 5px 18px rgba(0,0,0,.32)}
.btn-cont:not(:disabled):active{transform:scale(.95) translateY(2px)!important;transition:transform .07s ease!important;filter:brightness(.88)}
.btn-cont:disabled{opacity:.35;cursor:not-allowed}

.btn-danger{background:rgba(240,237,229,.05);border:1px solid rgba(240,237,229,.1);border-radius:9px;padding:.66rem 1rem;color:var(--t2);font-family:'Lato',sans-serif;font-size:.82rem;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;gap:.5rem;font-weight:700;letter-spacing:.03em;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),background .18s,border-color .18s,color .18s}
.btn-danger:hover{background:rgba(200,100,80,.1);border-color:rgba(200,100,80,.25);color:#e8a090}
.btn-danger:active{transform:scale(.96) translateY(1px)!important;transition:transform .07s ease!important}

/* ── MAIN LAYOUT ── */
.main-layout{flex:1;display:flex;height:100dvh;overflow:hidden;position:relative;z-index:2}

/* ── SIDEBAR ── */
.sidebar{width:262px;flex-shrink:0;background:rgba(0,34,33,.94);backdrop-filter:blur(24px);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sidebar-inner{flex:1;overflow-y:auto;overflow-x:hidden;padding:1.1rem;display:flex;flex-direction:column;gap:.88rem;-webkit-overflow-scrolling:touch}
.sidebar-inner::-webkit-scrollbar{width:2px}
.sidebar-inner::-webkit-scrollbar-thumb{background:rgba(240,237,229,.15);border-radius:1px}
.sb-brand{display:flex;align-items:center;gap:.72rem;padding-bottom:.9rem;border-bottom:1px solid var(--bdr)}
.sb-emblem{width:36px;height:36px;background:linear-gradient(135deg,var(--cy),var(--cy-ll));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;animation:breathe 4s ease-in-out infinite;border:1px solid rgba(240,237,229,.1)}
.sb-name{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:400;letter-spacing:.02em;color:var(--sd)}
.sb-tag{font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cy-ll);font-weight:700}
.sb-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cy-ll);font-weight:700}
.sb-box{background:rgba(240,237,229,.04);border:1px solid var(--bdr);border-radius:10px;padding:.76rem .88rem;transition:border-color .18s}
.sb-box:hover{border-color:rgba(240,237,229,.14)}
.sb-user-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--t1)}
.sb-user-sub{font-size:.67rem;color:var(--t3);margin-top:.1rem}
.badge-row{display:flex;gap:.38rem;flex-wrap:wrap;margin-top:.42rem}
.badge{font-size:.6rem;padding:.18rem .5rem;border-radius:20px;font-weight:700;border:1px solid transparent}
.streak-box{display:flex;align-items:center;gap:.65rem;background:rgba(184,149,106,.08);border:1px solid rgba(184,149,106,.18);border-radius:10px;padding:.76rem .88rem}
.streak-num{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--warm-l);line-height:1;font-weight:400}
.streak-lbl{font-size:.63rem;color:rgba(212,180,138,.7)}
.plan-item{display:flex;gap:.45rem;padding:.3rem 0;font-size:.72rem;color:var(--t3);border-bottom:1px solid rgba(240,237,229,.05)}
.plan-item:last-child{border:none}
.plan-dot{color:var(--cy-ll);flex-shrink:0;margin-top:.1rem}
.diagnosis-text{font-size:.72rem;color:var(--t3);line-height:1.6;font-style:italic}

/* ── SIDEBAR TABS ── */
.sidebar-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:.25rem;padding:.8rem 1.1rem;border-top:1px solid var(--bdr);flex-shrink:0;background:rgba(0,26,25,.6)}
.sb-tab{padding:.46rem .1rem;background:transparent;border:1px solid var(--bdr);border-radius:7px;color:var(--t3);font-family:'Lato',sans-serif;font-size:.55rem;cursor:pointer;text-align:center;line-height:1.3;font-weight:700;letter-spacing:.04em;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),background .18s,border-color .18s,color .18s}
.sb-tab .ti{display:block;font-size:.85rem;margin-bottom:.15rem}
.sb-tab:hover{background:rgba(240,237,229,.06);border-color:rgba(240,237,229,.18);color:var(--t1)}
.sb-tab:active{transform:scale(.9)!important;transition:transform .07s ease!important}
.sb-tab.active{background:var(--cy);border-color:rgba(240,237,229,.15);color:var(--sd)}

/* ── CONTENT ── */
.content-col{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative}
.content-header{background:rgba(0,26,25,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:.9rem 1.3rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:.7rem}
.status-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2.5s ease-in-out infinite}
.dot-chat   {background:var(--cy-ll);box-shadow:none}
.dot-skills {background:var(--warm);box-shadow:none}
.dot-checkin{background:#c8956a;box-shadow:none}
.dot-progress{background:var(--warm-l);box-shadow:none}
.dot-history{background:var(--sd-m);box-shadow:none}
.header-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--t1);font-weight:400}
.header-sub{font-size:.67rem;color:var(--t3)}
.header-info{font-size:.65rem;color:var(--t4);text-align:right;line-height:1.4}

/* ── CHAT ── */
.chat-messages{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(240,237,229,.12);border-radius:2px}
.msg-row{display:flex;gap:.65rem;max-width:86%}
.msg-row.ai  {align-self:flex-start;animation:slideL .3s ease both}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse;animation:slideR .3s ease both}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.msg-avatar.ai  {background:linear-gradient(135deg,var(--cy),var(--cy-ll));border:1px solid rgba(240,237,229,.1);animation:breathe 4s ease-in-out infinite}
.msg-avatar.user{background:rgba(240,237,229,.08);border:1px solid rgba(240,237,229,.12)}
.msg-bubble{padding:.8rem 1.05rem;border-radius:18px;font-size:.87rem;line-height:1.74;max-width:100%}
.msg-bubble.ai  {background:rgba(0,38,36,.92);border:1px solid rgba(240,237,229,.08);border-top-left-radius:4px;color:var(--sd-d);box-shadow:0 4px 18px rgba(0,0,0,.22)}
.msg-bubble.user{background:var(--cy);border:1px solid rgba(240,237,229,.12);border-top-right-radius:4px;color:var(--sd);box-shadow:0 4px 18px rgba(0,0,0,.22)}
.msg-bubble strong{font-weight:700;color:var(--warm-l)}
.msg-time{font-size:.6rem;color:var(--t4);margin-top:.22rem}
.msg-row.user .msg-time{text-align:right}
.typing{display:flex;align-items:center;gap:5px;padding:.8rem 1.05rem;background:rgba(0,38,36,.92);border:1px solid rgba(240,237,229,.08);border-radius:18px;border-top-left-radius:4px;animation:slideL .26s ease both}
.typing-dot{width:7px;height:7px;border-radius:50%;animation:tdot 1.4s ease-in-out infinite}
.typing-dot:nth-child(1){background:var(--cy-ll)}
.typing-dot:nth-child(2){background:var(--warm);animation-delay:.2s}
.typing-dot:nth-child(3){background:var(--sd-m);animation-delay:.4s}

/* ── CHAT FOOTER ── */
.chat-footer{background:rgba(0,26,25,.85);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);padding:.9rem 1.3rem;display:flex;gap:.65rem;align-items:flex-end;flex-shrink:0;padding-bottom:calc(.9rem + env(safe-area-inset-bottom,0px))}
.chat-input-wrap{flex:1;background:rgba(240,237,229,.05);border:1px solid var(--bdr);border-radius:13px;display:flex;align-items:flex-end;padding:.55rem .9rem;transition:border-color .2s,box-shadow .2s,background .2s}
.chat-input-wrap:focus-within{border-color:var(--cy-l);box-shadow:0 0 0 3px rgba(0,107,101,.15);background:rgba(240,237,229,.07)}
.chat-textarea{flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-family:'Lato',sans-serif;font-size:.87rem;resize:none;max-height:110px;line-height:1.55}
.chat-textarea::placeholder{color:var(--t4)}
.send-btn{width:42px;height:42px;background:var(--cy);border:1px solid rgba(240,237,229,.12);border-radius:10px;color:var(--sd);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 3px 12px rgba(0,0,0,.3);
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,filter .15s}
.send-btn:not(:disabled):hover{background:var(--cy-l)}
.send-btn:not(:disabled):active{transform:scale(.9) translateY(2px)!important;transition:transform .07s ease!important;filter:brightness(.85)}
.send-btn:disabled{opacity:.33;cursor:not-allowed}
.err-banner{padding:.6rem .95rem;background:rgba(200,100,80,.1);border:1px solid rgba(200,100,80,.25);border-radius:10px;font-size:.8rem;color:#e8a090;margin:0 1.3rem;flex-shrink:0}

/* ── PANELS ── */
.panel{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;-webkit-overflow-scrolling:touch}
.panel::-webkit-scrollbar,.ex-panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb,.ex-panel::-webkit-scrollbar-thumb{background:rgba(240,237,229,.12);border-radius:2px}

/* ── EXERCISES ── */
.ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.8rem}
.ex-card{background:rgba(0,70,67,.25);border:1px solid rgba(240,237,229,.08);border-radius:16px;padding:1.1rem;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:.45rem;width:100%;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),border-color .18s,box-shadow .18s}
.ex-card:hover{border-color:rgba(240,237,229,.18);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.28)}
.ex-card:active{transform:scale(.96) translateY(1px)!important;transition:transform .08s ease!important}
.ex-icon{font-size:1.75rem;animation:float 5s ease-in-out infinite}
.ex-card:nth-child(2) .ex-icon{animation-delay:1s}
.ex-card:nth-child(3) .ex-icon{animation-delay:2s}
.ex-card:nth-child(4) .ex-icon{animation-delay:3s}
.ex-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--t1);font-weight:400}
.ex-desc{font-size:.72rem;color:var(--t3);line-height:1.5}
.ex-tag{font-size:.6rem;padding:.2rem .5rem;background:rgba(0,107,101,.2);border:1px solid rgba(0,143,135,.3);border-radius:20px;color:var(--cy-ll);width:fit-content;font-weight:700}
.ex-panel{flex:1;min-height:0;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;-webkit-overflow-scrolling:touch}
.ex-panel-header{display:flex;align-items:center;gap:.75rem;flex-shrink:0}
.ex-panel-title{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--t1);font-weight:400;font-style:italic}
.qbox{background:rgba(0,38,36,.9);border:1px solid var(--bdr);border-radius:16px;padding:1.6rem;backdrop-filter:blur(12px)}

/* ── BREATHING ── */
.breath-wrap{display:flex;flex-direction:column;align-items:center;padding:1.6rem 0}
.breath-circle{width:150px;height:150px;border-radius:50%;border:1.5px solid rgba(240,237,229,.2);display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,70,67,.15);transition:all 1.1s ease}
.breath-circle.inhale{transform:scale(1.28);background:rgba(0,107,101,.25);border-color:var(--cy-ll)}
.breath-circle.hold  {transform:scale(1.28);background:rgba(184,149,106,.12);border-color:var(--warm)}
.breath-circle.exhale{transform:scale(1);background:rgba(0,70,67,.08);border-color:rgba(240,237,229,.15)}
.breath-phase{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--t1);font-weight:400}
.breath-count{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:400;line-height:1;color:var(--warm-l)}
.breath-guide{text-align:center;font-size:.83rem;color:var(--t3);margin-top:.9rem;line-height:1.68}

/* ── MOOD BUTTONS ── */
.mood-row{display:flex;gap:.45rem}
.mood-btn{flex:1;aspect-ratio:1;background:rgba(240,237,229,.04);border:1px solid var(--bdr);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem;font-size:1.45rem;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),background .18s,border-color .18s}
.mood-btn span{font-size:.57rem;letter-spacing:.05em;color:var(--t3);font-weight:700;text-transform:uppercase}
.mood-btn:hover{background:rgba(0,107,101,.18);border-color:rgba(0,143,135,.35)}
.mood-btn.active{background:var(--cy);border-color:rgba(240,237,229,.2);transform:scale(1.06)}
.mood-btn:active{transform:scale(.93)!important;transition:transform .07s ease!important}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.65rem}
.stat-card{background:rgba(240,237,229,.04);border:1px solid var(--bdr);border-radius:12px;padding:.85rem .95rem;text-align:center;animation:fadeUp .4s ease both;transition:border-color .18s}
.stat-card:hover{border-color:rgba(240,237,229,.16)}
.stat-num{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:400;line-height:1;color:var(--warm-l)}
.stat-lbl{font-size:.63rem;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-top:.28rem;font-weight:700}

/* ── HISTORY ── */
.hist-card{background:rgba(240,237,229,.04);border:1px solid var(--bdr);border-radius:12px;padding:.85rem .95rem;transition:border-color .18s,background .18s;animation:fadeUp .35s ease both}
.hist-card:hover{border-color:rgba(240,237,229,.15);background:rgba(240,237,229,.06)}
.hist-date{font-size:.63rem;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:.32rem;font-weight:700}
.hist-note{font-size:.78rem;color:var(--t3);line-height:1.55;font-style:italic;margin-top:.25rem}

/* ── THOUGHT RECORD ── */
.opt-chips{display:flex;flex-wrap:wrap;gap:.32rem}
.chip{padding:.38rem .68rem;background:rgba(240,237,229,.05);border:1px solid var(--bdr);border-radius:8px;font-size:.7rem;color:var(--t2);cursor:pointer;font-family:'Lato',sans-serif;font-weight:700;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),background .15s,border-color .15s}
.chip:hover{background:rgba(0,107,101,.18);border-color:rgba(0,143,135,.3)}
.chip:active{transform:scale(.92)!important;transition:transform .07s ease!important}
.chip.active{background:var(--cy);border-color:rgba(240,237,229,.2);color:var(--sd)}

/* ── PROGRESS BAR ── */
.pbar{height:4px;background:rgba(240,237,229,.08);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--cy),var(--cy-ll));border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* ── CREDITS BAR ── */
.credits-bar{height:4px;background:rgba(240,237,229,.07);border-radius:2px;overflow:hidden;margin-top:.4rem}
.credits-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── ATTACHMENTS ── */
.attach-strip{display:flex;flex-wrap:wrap;gap:.45rem;padding:.6rem 1.3rem .2rem;background:rgba(0,26,25,.7);border-top:1px solid var(--bdr);flex-shrink:0}
.attach-thumb{position:relative;border-radius:10px;overflow:hidden;border:1px solid rgba(240,237,229,.12)}
.attach-thumb img{width:62px;height:62px;object-fit:cover;display:block}
.attach-file{display:flex;align-items:center;gap:.35rem;padding:.4rem .65rem;background:rgba(240,237,229,.06);border-radius:10px;border:1px solid var(--bdr);font-size:.72rem;color:var(--t2);max-width:145px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:700}
.attach-remove{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.7);border:none;border-radius:50%;color:#fff;font-size:.62rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.attach-remove:active{transform:scale(.85)!important;transition:transform .07s ease!important}
.attach-err{font-size:.75rem;color:#e8a090;padding:.35rem 1.3rem;flex-shrink:0}

/* ── TOGGLES ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.58rem 0;border-bottom:1px solid rgba(240,237,229,.06)}
.toggle-row:last-child{border:none}
.toggle-label{font-size:.75rem;color:var(--t2);line-height:1.4;flex:1;padding-right:.65rem;font-weight:700}
.toggle-label small{display:block;font-size:.63rem;color:var(--t3);margin-top:.1rem;font-weight:400}
.toggle{position:relative;width:38px;height:21px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:rgba(240,237,229,.08);border-radius:21px;cursor:pointer;transition:background .22s;border:1px solid rgba(240,237,229,.1)}
.toggle-slider::before{content:'';position:absolute;height:15px;width:15px;left:2px;bottom:2px;background:var(--t3);border-radius:50%;transition:transform .22s,background .22s}
.toggle input:checked + .toggle-slider{background:rgba(0,107,101,.45);border-color:rgba(0,143,135,.5)}
.toggle input:checked + .toggle-slider::before{transform:translateX(17px);background:var(--cy-ll)}

/* ── TOKEN BADGE ── */
.token-badge{font-size:.62rem;padding:.18rem .52rem;background:rgba(184,149,106,.1);border:1px solid rgba(184,149,106,.22);border-radius:20px;color:var(--warm-l);white-space:nowrap;font-weight:700}

/* ── CONFIRM ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:200;padding:1.5rem;animation:fadeUp .2s ease both}
.confirm-box{background:rgba(0,38,36,.98);border:1px solid rgba(240,237,229,.12);border-radius:20px;padding:2rem;max-width:340px;width:100%;text-align:center}
.confirm-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--t1);font-weight:400;margin-bottom:.7rem;font-style:italic}
.confirm-text{font-size:.85rem;color:var(--t3);line-height:1.65;margin-bottom:1.4rem}
.confirm-btns{display:flex;gap:.7rem}

/* ── MISC ── */
.safety-banner{background:rgba(200,100,80,.08);border:1px solid rgba(200,100,80,.22);border-radius:12px;padding:.9rem 1rem;font-size:.83rem;color:#e8a090;line-height:1.65}
.section-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cy-ll);margin-bottom:.4rem;font-weight:700}
.nav-row{display:flex;justify-content:space-between;align-items:center}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.empty-msg{text-align:center;color:var(--t4);font-style:italic;padding:2.5rem;font-size:.88rem}

/* ── MOBILE NAV ── */
.mobile-nav{display:none;background:rgba(0,26,25,.97);backdrop-filter:blur(24px);border-top:1px solid var(--bdr);padding:.5rem .85rem;padding-bottom:calc(.5rem + env(safe-area-inset-bottom,0px));flex-shrink:0}
.mobile-nav-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.28rem}
.mobile-tab{padding:.5rem .15rem;background:transparent;border:1px solid var(--bdr);border-radius:9px;color:var(--t3);font-family:'Lato',sans-serif;font-size:.55rem;cursor:pointer;text-align:center;line-height:1.3;font-weight:700;letter-spacing:.04em;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),background .18s,border-color .18s,color .18s}
.mobile-tab .ti{display:block;font-size:1.05rem;margin-bottom:.15rem}
.mobile-tab:hover{background:rgba(240,237,229,.06);border-color:rgba(240,237,229,.18);color:var(--t1)}
.mobile-tab:active{transform:scale(.88)!important;transition:transform .07s ease!important}
.mobile-tab.active{background:var(--cy);border-color:rgba(240,237,229,.15);color:var(--sd)}

/* ── HAMBURGER + MOBILE SIDEBAR DRAWER ── */
.hamburger-btn{display:none;width:38px;height:38px;min-width:38px;background:rgba(240,237,229,.06);border:1px solid var(--bdr);border-radius:9px;color:var(--t1);font-size:1.05rem;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s,border-color .18s}
.hamburger-btn:hover{background:rgba(240,237,229,.1);border-color:rgba(240,237,229,.2)}
.hamburger-btn:active{transform:scale(.9)}
.sb-close{display:none;margin-left:auto;width:30px;height:30px;background:rgba(240,237,229,.06);border:1px solid var(--bdr);border-radius:8px;color:var(--t2);font-size:.85rem;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
.sb-backdrop{display:none;position:fixed;inset:0;z-index:255;background:rgba(0,10,10,.6);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .28s ease}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .mobile-nav{display:block}
  .hamburger-btn{display:flex}
  .sb-close{display:flex}
  .sb-backdrop{display:block}
  .sb-backdrop.show{opacity:1;pointer-events:auto}
  .sidebar{position:fixed;top:0;bottom:0;left:0;z-index:260;width:min(300px,85vw);transform:translateX(-105%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:0 0 60px rgba(0,0,0,.55);border-right:1px solid var(--bdr);
    padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px)}
  .sidebar.open{transform:translateX(0)}
  /* 16px stops iOS Safari from auto-zooming the page when an input gets focus */
  .chat-textarea,.inp,select.inp{font-size:16px}
  .chat-messages{padding:.85rem;gap:.8rem}.panel{padding:.85rem}
  .content-header{padding:.65rem .8rem;gap:.4rem}
  .chat-header-badges{gap:.35rem}
  .chat-footer{padding:.65rem .8rem;padding-bottom:calc(.65rem + env(safe-area-inset-bottom,0px));gap:.5rem}
  .card{padding:1.7rem 1.3rem}.lewa-title{font-size:1.9rem}
  .msg-row{max-width:90%;gap:.5rem}
  .msg-bubble{font-size:.85rem;padding:.68rem .85rem}
  .msg-avatar{width:28px;height:28px;font-size:.78rem}
  .ex-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:.6rem}
  .ex-card{padding:.9rem;gap:.35rem}
  .ex-icon{font-size:1.5rem}
  .mood-row{gap:.32rem}
  .mood-btn{padding:.45rem .15rem}
  .mood-btn span{font-size:.52rem}
  .token-badge{font-size:.58rem;padding:.15rem .42rem}
  .camera-banner{padding:.5rem .8rem;gap:.55rem}
  .camera-banner-text{font-size:.68rem}
  .send-btn,.icon-btn{width:38px;height:38px;min-width:38px}
  .qbox{padding:1.2rem}
  .ex-panel,.panel{gap:.8rem}
  .stats-grid{gap:.5rem}
  .stat-card{padding:.7rem .8rem}
}
@media(max-width:480px){
  .grid-2{grid-template-columns:1fr}
  .chat-messages{padding:.65rem;gap:.65rem}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .content-header{padding:.6rem .7rem}
  .lewa-title{font-size:1.65rem}
  .ex-grid{grid-template-columns:1fr}
  .msg-bubble{font-size:.82rem;line-height:1.6}
  .msg-row{max-width:94%}
  .mood-row{flex-wrap:wrap}
  .mood-btn{flex:1 1 30%;min-width:56px}
  .card{padding:1.4rem 1.1rem}
  .chat-header-badges{justify-content:flex-start;width:100%}
  .call-avatar-wrap{width:150px;height:150px}
  .call-avatar{width:92px;height:92px;font-size:2.1rem}
  .call-name{font-size:1.6rem}
  .call-controls{gap:1.2rem}
  .call-btn{width:54px;height:54px;font-size:1.15rem}
  .call-transcript{font-size:.85rem}
  .header-title{font-size:.98rem}
  .header-sub{display:none}
}
@media(min-width:769px){
  .sidebar{display:flex}.mobile-nav{display:none}
}

/* ── ACCOUNT SCREEN ── */
.acc-item:hover{background:rgba(240,237,229,.07)!important;border-color:rgba(240,237,229,.18)!important}

/* ── V2: VOICE CALL · MOOD RAMP · POLISH ── */
:focus-visible{outline:2px solid rgba(0,143,135,.65);outline-offset:2px;border-radius:6px}
.model-notice{font-size:.75rem;color:#8fd8d0;background:rgba(0,143,135,.08);border-top:1px solid rgba(0,143,135,.18);padding:.45rem 1.3rem;flex-shrink:0;line-height:1.5}
.call-overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.05rem;background:radial-gradient(120% 120% at 50% 0%,#013a37 0%,#001a19 58%,#000f0e 100%);animation:fadeUp .3s ease both;padding:2rem 1.4rem}
.call-avatar-wrap{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center}
.call-avatar{width:112px;height:112px;border-radius:50%;background:linear-gradient(135deg,var(--cy),var(--cy-ll));display:flex;align-items:center;justify-content:center;font-size:2.6rem;border:2px solid rgba(240,237,229,.18);box-shadow:0 10px 40px rgba(0,143,135,.35);z-index:2}
.call-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,143,135,.45)}
.call-listening .call-ring{animation:callRing 2.6s ease-out infinite}
.call-thinking .call-ring{animation:callRing 1.9s ease-out infinite;border-color:rgba(240,237,229,.28)}
.call-speaking .call-ring{animation:callRing 1.15s ease-out infinite;border-color:rgba(212,180,138,.55)}
.call-ring:nth-child(2){animation-delay:.55s}
.call-ring:nth-child(3){animation-delay:1.1s}
@keyframes callRing{0%{transform:scale(.62);opacity:.85}100%{transform:scale(1.3);opacity:0}}
.call-name{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--sd);font-weight:400;text-align:center}
.call-state{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--t3);font-weight:700;text-align:center}
.call-timer{font-size:.85rem;color:var(--warm-l);font-variant-numeric:tabular-nums;letter-spacing:.08em;text-align:center;margin-top:.3rem}
.call-transcript{min-height:2.7em;max-width:430px;text-align:center;font-size:.92rem;line-height:1.65;color:var(--t2);font-style:italic;padding:0 .5rem}
.call-controls{display:flex;gap:1.7rem;margin-top:.7rem}
.call-btn{position:relative;width:60px;height:60px;border-radius:50%;border:1px solid rgba(240,237,229,.16);background:rgba(240,237,229,.07);color:var(--sd);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s}
.call-btn:hover{background:rgba(240,237,229,.13)}
.call-btn:active{transform:scale(.9)}
.call-btn small{position:absolute;bottom:-1.4rem;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-weight:700;white-space:nowrap}
.call-btn.muted{background:rgba(224,92,92,.18);border-color:rgba(224,92,92,.4);color:#f2a4a4}
.call-btn.end{background:#b23a3a;border-color:rgba(255,255,255,.2);box-shadow:0 6px 22px rgba(178,58,58,.4)}
.call-btn.end:hover{background:#c74444}
.mood-ramp{touch-action:none;user-select:none;-webkit-user-select:none;cursor:pointer;display:block;width:100%;max-width:430px;margin:0 auto}
.mood-ramp:focus-visible{outline:2px solid rgba(0,143,135,.65);outline-offset:4px;border-radius:12px}
.mood-readout{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.15rem;font-size:.9rem;color:var(--t1);font-weight:700;letter-spacing:.03em;min-height:1.5em}
.boot-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,15,14,.94);backdrop-filter:blur(6px);display:flex;flex-direction:column;gap:1.25rem;align-items:center;justify-content:center;animation:fadeUp .2s ease both}
.boot-msg{font-size:.75rem;color:var(--t2);letter-spacing:.16em;text-transform:uppercase;font-weight:700}
.dot-spin{display:flex;gap:.55rem;align-items:center;justify-content:center}
.dot-spin span{width:13px;height:13px;border-radius:50%;animation:dotPulse 1s ease-in-out infinite;box-shadow:0 0 10px rgba(0,143,135,.35)}
@keyframes dotPulse{0%,100%{transform:scale(.5);opacity:.3}50%{transform:scale(1.05);opacity:1}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>

<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* pdf.js needs an explicit worker script location to run */
if (window.pdfjsLib) {
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

/* ── CONSTANTS ── */
/* Mood intensity expressed as brand-colored dots rather than emoji faces —
   reads as a considered, custom design choice rather than default chatbot styling. */
const MOODS = ["#a85c4a","#c08a4e","#8f8a78","#4a8a6e","#008f87"];
const MOOD_LABELS = ["Very Low","Low","Neutral","Good","Great"];
const TODAY = new Date().toISOString().slice(0,10);
const fmtD = d => new Intl.DateTimeFormat("en-GB",{day:"numeric",month:"short",year:"numeric"}).format(new Date(d));
const fmtT = d => new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit"}).format(new Date(d));

/* ── STORAGE ── */

/* ════════════════════════════════════════════════════════
   LEWA SOUND ENGINE
   All sounds generated via Web Audio API — no files needed.
   Toggle sounds: set SOUNDS_ON = false to disable globally.
   ════════════════════════════════════════════════════════ */
const SOUNDS_ON = true;
let _actx = null;
function getCtx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}
/* Soft felt piano key — gentle attack, long tail */
function playNote(freq = 440, dur = 0.38, vol = 0.09) {
  if (!SOUNDS_ON) return;
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.98, ctx.currentTime + dur);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(_) {}
}
/* Quick soft woodblock tap */
function playTap() {
  if (!SOUNDS_ON) return;
  try {
    const ctx = getCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i / (ctx.sampleRate * 0.008));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 800; filter.Q.value = 0.6;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
    src.start(); src.stop(ctx.currentTime + 0.08);
  } catch(_) {}
}

/* Named sounds for different interactions */
const SND = {
  tap     : () => playTap(),                          /* buttons, tabs, chips   */
  send    : () => { playNote(523.25, 0.22, 0.07); setTimeout(()=>playNote(659.25, 0.28, 0.05), 60); }, /* send message — two soft notes */
  open    : () => playNote(349.23, 0.45, 0.08),      /* screen transitions      */
  checkin : () => { playNote(440, 0.3, 0.07); setTimeout(()=>playNote(554.37, 0.4, 0.06), 80); setTimeout(()=>playNote(659.25, 0.5, 0.05), 180); }, /* check-in submit — gentle chord */
  select  : () => playNote(392, 0.18, 0.06),         /* mood selection          */
  delete  : () => playNote(220, 0.2, 0.06),          /* delete / danger         */
  toggle  : () => playNote(523.25, 0.15, 0.05),      /* toggle switch           */

   TEXT-TO-SPEECH — LEWA reads its responses aloud

   ════════════════════════════════════════════════════════════ */
const TTS_SUPPORTED = typeof window !== 'undefined' && 'speechSynthesis' in window;
let _ttsAllVoices = [];
let _ttsVoicesLoaded = false;

/* The Web Speech API doesn't expose a real "gender" field on voices, so we
   infer it from naming conventions used across Chrome/Edge/Safari/Android.
   Voices explicitly flagged as higher quality ("Natural"/"Neural"/"Premium"/
   "Enhanced") are preferred within each group, since those sound
   dramatically less robotic than the legacy default voices. */
function _voiceQualityScore(v) {
  const n = v.name.toLowerCase();
  let score = 0;
  if (/natural|neural|premium|enhanced|studio/.test(n)) score += 10;
  if (/aria|jenny|libby|sonia|ryan|natasha|samantha|karen|daniel|moira|serena|allison|google uk english|google us english/.test(n)) score += 4;
  if (/online/.test(n)) score += 2; // often better cloud voices vs on-device legacy engine
  if (v.localService === false) score += 1; // network voices are often higher quality
  return score;
}
function _voiceGender(v) {
  const n = v.name.toLowerCase();
  const femaleHints = ['female','samantha','victoria','karen','moira','tessa','fiona','zira','aria','jenny','emma','ava','susan','allison','ava','samantha','serena','joanna','salli','kimberly','kendra'];
  const maleHints   = ['male','daniel','fred','david','mark','james','guy','ryan','christopher','alex','tom','justin','matthew','joey','brian'];
  if (n.includes('female')) return 'female';
  if (n.includes('male'))   return 'male';
  if (femaleHints.some(h => n.includes(h))) return 'female';
  if (maleHints.some(h => n.includes(h)))   return 'male';
  return 'unknown';
}
function _loadVoices() {

  if (!voices.length) return;
  _ttsVoicesLoaded = true;
  const english = voices.filter(v => v.lang.startsWith('en'));
  _ttsAllVoices = (english.length ? english : voices)
    .map(v => ({ voice: v, gender: _voiceGender(v), score: _voiceQualityScore(v) }))
    .sort((a,b) => b.score - a.score);
}
if (TTS_SUPPORTED) {
  _loadVoices();
  window.speechSynthesis.onvoiceschanged = _loadVoices;
}
/* Returns the best available voice — by exact name first, then gender, then quality */
function pickVoice(pref, name) {
  if (!_ttsAllVoices.length) return null;
  if (name) { const m = _ttsAllVoices.find(x => x.voice.name === name); if (m) return m.voice; }
  if (pref === 'female' || pref === 'male') {
    const match = _ttsAllVoices.find(x => x.gender === pref);
    if (match) return match.voice;
  }
  return _ttsAllVoices[0].voice; // best-scoring voice overall as a graceful fallback
}
/* The highest-quality voices on this device, for the voice picker */
function listTopVoices() {
  return _ttsAllVoices.slice(0, 8).map(x => ({
    name: x.voice.name,
    label: `${x.voice.name.replace(/Microsoft |Google |Online |\(Natural\)|Neural/gi,'').replace(/\s+/g,' ').trim().slice(0,30)}${x.gender!=='unknown' ? ` · ${x.gender}` : ''}`
  }));
}
function listAvailableGenders() {
  const genders = new Set(_ttsAllVoices.map(x => x.gender));
  return { female: genders.has('female'), male: genders.has('male') };
}
function stripForSpeech(text) {
  return (text || '')
    .replace(/\*\*(.+?)\*\*/g, '$1')          // remove bold markers
    .replace(/^[\s]*[-•▸*]\s+/gm, '')          // bullets read as plain sentences
    .replace(/[_`~#>]/g, '')                  // strip stray markdown
    .replace(/https?:\/\/\S+/g, '')           // don't read out raw URLs
    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}]/gu, '') // never vocalize emoji
    .replace(/\s[—–]\s/g, ', ')               // dashes become a gentle pause
    .replace(/[ \t]{2,}/g, ' ')

/* Split into sentences so LEWA can breathe between them — the pauses are
   what make the delivery feel like a person, not a screen reader. Also
   sidesteps Chrome's bug where long single utterances cut off mid-way. */
function _speechChunks(text) {
  const out = [];
  const paras = text.split(/\n{2,}/);
  paras.forEach((p, pi) => {
    const sents = p.replace(/\n+/g, ' ').match(/[^.!?…]+[.!?…]+["')\]]*|[^.!?…]+$/g) || [p];
    sents.forEach((s, si) => {
      const t = s.trim();

    });

let _speakToken = 0;
function speakText(text, onEnd, genderPref, voiceName) {
  if (!TTS_SUPPORTED) { onEnd && onEnd(); return; }
  window.speechSynthesis.cancel(); // stop anything currently speaking
  const tok = ++_speakToken;
  const clean = stripForSpeech(text);
  if (!clean) { onEnd && onEnd(); return; }
  const v = pickVoice(genderPref, voiceName);
  const chunks = _speechChunks(clean);
  const next = (i) => {
    if (tok !== _speakToken) return;                 // superseded or stopped
    if (i >= chunks.length) { onEnd && onEnd(); return; }
    const u = new SpeechSynthesisUtterance(chunks[i].t);
    if (v) u.voice = v;
    /* Unhurried, slightly softened — the pace of someone who has time for you. */
    u.rate = 0.94;
    u.pitch = 0.98;
    u.volume = 1;
    const adv = () => { if (tok !== _speakToken) return; setTimeout(() => next(i + 1), chunks[i].pause); };
    u.onend = adv;
    u.onerror = adv;
    window.speechSynthesis.speak(u);

   SPEECH-TO-TEXT — voice input for hands-free conversation
   ════════════════════════════════════════════════════════════ */
const SpeechRecognitionAPI = typeof window !== 'undefined' ? (window.SpeechRecognition || window.webkitSpeechRecognition) : null;
const STT_SUPPORTED = !!SpeechRecognitionAPI;
function createRecognizer({ onResult, onEnd, onError }) {
  if (!STT_SUPPORTED) return null;
  const rec = new SpeechRecognitionAPI();
  rec.lang = 'en-US';
  rec.continuous = false;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  rec.onresult = (e) => {
    let finalText = '', interimText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalText += t; else interimText += t;
    }
    onResult && onResult(finalText, interimText);
  };
  rec.onend = () => onEnd && onEnd();
  rec.onerror = (e) => onError && onError(e.error);
  return rec;
}

/* ════════════════════════════════════════════════════════════
   AMBIENT SOUNDSCAPE — a gentle generative calming loop
   Built entirely with the Web Audio API — layered soft tones
   plus filtered noise, evoking a quiet room / distant rain.
   ════════════════════════════════════════════════════════════ */
let _ambientNodes = null;
function startAmbientSoundscape() {
  stopAmbientSoundscape();
  try {
    const ctx = getCtx();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0, ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.14, ctx.currentTime + 2.5);
    master.connect(ctx.destination);

    /* Soft drifting pad — two slightly-detuned sine waves */
    const padFreqs = [220, 220.6];
    const padOscs = padFreqs.map(f => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0.5;
      o.connect(g); g.connect(master); o.start();
      return o;
    });

    /* Gentle filtered noise, like distant rain */
    const bufSize = ctx.sampleRate * 2;
    const noiseBuf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) nd[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource(); noise.buffer = noiseBuf; noise.loop = true;
    const noiseFilter = ctx.createBiquadFilter(); noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 700;
    const noiseGain = ctx.createGain(); noiseGain.gain.value = 0.12;
    noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(master); noise.start();

    /* Slow LFO breathing the pad's volume in and out */
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
    const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.03;
    lfo.connect(lfoGain); lfoGain.connect(master.gain); lfo.start();

    _ambientNodes = { ctx, master, padOscs, noise, lfo };
  } catch(_) {}
}
function stopAmbientSoundscape() {
  if (!_ambientNodes) return;
  try {
    const { ctx, master, padOscs, noise, lfo } = _ambientNodes;
    master.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.2);
    setTimeout(() => { try { padOscs.forEach(o=>o.stop()); noise.stop(); lfo.stop(); } catch(_){} }, 1300);
  } catch(_) {}
  _ambientNodes = null;
}

/* ════════════════════════════════════════════════════════════
   KEY VAULT — obfuscated at-rest storage for the API key
   ────────────────────────────────────────────────────────────
   This prevents the key from sitting in localStorage as a
   plain, human-readable, or text-searchable string (e.g. you
   won't find "sk-ant-..." by browsing DevTools > Application,
   exporting storage, or grepping a backup of the page).

   It does NOT — and cannot — hide the key from the Network
   tab at the moment a request is sent, since the AI provider
   requires the real key in plaintext to authenticate. No
   client-side trick can change that; only a server-side proxy
   (a different architecture than this single-file app) can.
   ════════════════════════════════════════════════════════════ */
const _VK = 'lewa-x9q2';           // storage slot — deliberately unlabeled
const _VS = 'cy.sd//therapy::2026'; // obfuscation passphrase
function _vEnc(str) {
  if (!str) return '';
  let out = '';
  for (let i = 0; i < str.length; i++) out += String.fromCharCode(str.charCodeAt(i) ^ _VS.charCodeAt(i % _VS.length));
  try { return btoa(unescape(encodeURIComponent(out))); } catch(_) { return ''; }
}
function _vDec(b64) {
  if (!b64) return '';
  try {
    const raw = decodeURIComponent(escape(atob(b64)));
    let out = '';
    for (let i = 0; i < raw.length; i++) out += String.fromCharCode(raw.charCodeAt(i) ^ _VS.charCodeAt(i % _VS.length));
    return out;
  } catch(_) { return ''; }
}
const KeyVault = {
  save: (key) => S.set(_VK, _vEnc(key)),

/* ── FILE → BASE64 / TEXT ── */
async function extractPdfText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  const maxPages = Math.min(pdf.numPages, 25); // guard against enormous PDFs
  for (let i = 1; i <= maxPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n\n";
  }
  if (pdf.numPages > maxPages) text += `\n[…${pdf.numPages - maxPages} more page(s) not shown]`;
  return text.trim() || "[This PDF has no extractable text — it may be a scanned image.]";
}

async function extractDocxText(file) {
  const buf = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
  return (result.value || "").trim() || "[This document appears to be empty.]";
}

function readFileAsync(file) {
  return new Promise(async (resolve, reject) => {
    const isImage = file.type.startsWith("image/");
    const isText  = file.type.startsWith("text/") || /\.(txt|md|csv|json)$/i.test(file.name);
    const isPdf   = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
    const isDocx  = /\.docx$/i.test(file.name) || file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document";

    if (isImage) {
      const reader = new FileReader();
      reader.onload = e => {
        const full = e.target.result;
        const base64 = full.split(",")[1];
        resolve({ kind:"image", name:file.name, mime:file.type, base64, preview:full });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
      return;
    }
    if (isPdf) {
      try { const text = await extractPdfText(file); resolve({ kind:"text", name:file.name, text: `[PDF: ${file.name}]\n${text.slice(0,6000)}` }); }
      catch(err) { reject(new Error(`Could not read PDF "${file.name}". It may be corrupted or scanned.`)); }
      return;
    }
    if (isDocx) {
      try { const text = await extractDocxText(file); resolve({ kind:"text", name:file.name, text: `[Document: ${file.name}]\n${text.slice(0,6000)}` }); }
      catch(err) { reject(new Error(`Could not read "${file.name}". Please try saving it as .txt or .pdf.`)); }
      return;
    }
    if (isText) {
      const reader = new FileReader();
      reader.onload = e => resolve({ kind:"text", name:file.name, mime:file.type, text:e.target.result });
      reader.onerror = reject;
      reader.readAsText(file);
      return;
    }
    reject(new Error("Unsupported file type. Supported: images, PDF, Word (.docx), .txt .md .csv .json"));
  });
}

/* ── BACKGROUND WEB SEARCH — silent, free, provider-agnostic ──────────
   Uses DuckDuckGo Instant Answers + Wikipedia (both keyless and CORS-
   open), so it consumes zero API credits and works identically with
   every model, including Nemotron. Results are slipped into the system
   prompt; the patient only ever sees LEWA's normal reply — no thoughts,
   no research process. ── */
async function bgWebSearch(query) {
  const q = (query || '').replace(/\s+/g, ' ').trim().slice(0, 180);
  if (!q) return '';
  const withTimeout = (p, ms) => Promise.race([p, new Promise(res => setTimeout(() => res(null), ms))]);
  const out = [];
  try {
    const ddg = await withTimeout(
      fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&no_redirect=1&skip_disambig=1`)
        .then(r => r.json()).catch(() => null), 4000);
    if (ddg) {
      if (ddg.AbstractText) out.push(`• ${ddg.Heading || 'Overview'}: ${ddg.AbstractText.slice(0, 300)}${ddg.AbstractURL ? ` (${ddg.AbstractURL})` : ''}`);
      if (ddg.Answer) out.push(`• Direct answer: ${String(ddg.Answer).slice(0, 200)}`);
      (ddg.RelatedTopics || []).slice(0, 3).forEach(t => {
        const txt = t.Text || t.Topics?.[0]?.Text;
        const url = t.FirstURL || t.Topics?.[0]?.FirstURL;
        if (txt) out.push(`• ${txt.slice(0, 220)}${url ? ` (${url})` : ''}`);
      });
    }
  } catch(_) {}
  try {
    if (out.length < 2) {
      const os = await withTimeout(
        fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&limit=1&format=json&origin=*&search=${encodeURIComponent(q)}`)
          .then(r => r.json()).catch(() => null), 3500);
      const title = os?.[1]?.[0];
      if (title) {
        const sum = await withTimeout(
          fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`)
            .then(r => r.json()).catch(() => null), 3500);
        if (sum?.extract) out.push(`• Wikipedia — ${sum.title}: ${sum.extract.slice(0, 350)}`);
      }
    }
  } catch(_) {}
  return out.slice(0, 5).join('\n');
}

const KEY_SIGNUP_URLS = {
  gemini:     'https://aistudio.google.com/apikey',
  openrouter: 'https://openrouter.ai/keys',

  openai:     'https://platform.openai.com/api-keys',

/* ════════════════════════════════════════════════════════════
   OPENROUTER "CONNECT" FLOW (PKCE)
   ────────────────────────────────────────────────────────────
   OpenRouter supports a real one-click OAuth flow: instead of
   copy-pasting a key, the person clicks "Get a Free Key", logs
   into OpenRouter in a new tab, and is redirected straight back
   here with their key already filled in and verified.

   This only works once the page is served from a real https://
   (or http://localhost) address — OAuth providers reject
   file:// URLs as callback targets, since a redirect can't
   reliably return to a local file. If the file is opened
   directly instead of hosted, the button falls back to simply
   opening OpenRouter's key page in a new tab for manual copy.
   ════════════════════════════════════════════════════════════ */
function _b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function _pkceVerifier(len=64) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return _b64url(arr.buffer);
}
async function _pkceChallenge(verifier) {
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return _b64url(digest);
}
function canUseOAuthRedirect() {
  return window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
}
async function startOpenRouterConnect() {
  const verifier  = _pkceVerifier();
  const challenge = await _pkceChallenge(verifier);
  sessionStorage.setItem('lewa-pkce-verifier', verifier);
  const callbackUrl = window.location.origin + window.location.pathname;
  const url = `https://openrouter.ai/auth?callback_url=${encodeURIComponent(callbackUrl)}&code_challenge=${encodeURIComponent(challenge)}&code_challenge_method=S256`;
  window.location.href = url;
}
async function completeOpenRouterConnect(code) {
  const verifier = sessionStorage.getItem('lewa-pkce-verifier') || '';
  const res = await fetch('https://openrouter.ai/api/v1/auth/keys', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, code_verifier: verifier, code_challenge_method: 'S256' }),
  });
  sessionStorage.removeItem('lewa-pkce-verifier');
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'Could not complete OpenRouter connection.'); }
  const data = await res.json();
  return data.key;
}

/* ── GEMINI API CALL ── */
/* ── OUTPUT SANITIZER — model "processes" never reach the patient ──────
   Reasoning models sometimes leak their thinking into the reply (tagged
   blocks, or "Reasoning: … Answer: …" scaffolds). Every provider call is
   passed through this, so only the final reply is ever shown or spoken. */
function cleanModelOutput(t) {
  let s = String(t || '');
  s = s.replace(/<(think|thinking|thought|thoughts|reasoning|reason|analysis|scratchpad)>[\s\S]*?<\/\1>/gi, '');
  s = s.replace(/<\/?(think|thinking|thought|thoughts|reasoning|reason|analysis|scratchpad)>/gi, '');
  s = s.replace(/^\s*(?:reasoning|thought process|thoughts|thinking|analysis|internal monologue)\s*:\s*[\s\S]*?\n\s*(?:final answer|final response|answer|response|reply)\s*:\s*/i, '');
  return s.trim();
}

async function callGemini(msgs, profile, key, ctx, maxT, model, opts={}) {
  const sysText = buildPrompt(profile, ctx);
  // Convert messages — Gemini uses "model" not "assistant"
  const contents = msgs.slice(-CFG.CONTEXT_LIMIT).map(m => {
    const role = m.role === 'assistant' ? 'model' : 'user';
    let parts;
    if (Array.isArray(m.content)) {
      parts = m.content.map(c => {
        if (c.type === 'text') return { text: c.text };
        if (c.type === 'image_url') {
          const [meta, data] = c.image_url.url.split(',');
          const mime = meta.match(/:(.*?);/)[1];
          return { inlineData: { mimeType: mime, data } };
        }
        return { text: '' };
      });
    } else {
      parts = [{ text: m.display || m.content || '' }];
    }
    return { role, parts };
  });
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
    { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction: { parts:[{ text: sysText }] },
        contents,
        generationConfig: { maxOutputTokens: maxT || CFG.MAX_TOKENS, temperature: 0.85,
          /* Gemini 3 defaults to medium thinking — keep it low so tokens go
             to the reply, not to hidden processes. Thinking still works. */
          ...(String(model).startsWith('gemini-3') ? { thinkingConfig: { thinkingLevel: 'low' } } : {}) }
      })
    }
  );
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`Gemini error ${res.status}`); }
  const data = await res.json();
  return cleanModelOutput(data.candidates?.[0]?.content?.parts?.filter(p=>!p.thought).map(p=>p.text||'').join('')) || "I'm having trouble responding. Please try again.";
}

/* ── OPENAI-COMPATIBLE CALL (OpenRouter, OpenAI, Custom) ── */
async function callOpenAICompat(msgs, profile, key, ctx, maxT, ctxLimit, model, baseURL, extraHeaders, opts={}) {
  const sysPart = { role:'system', content: buildPrompt(profile, ctx) };
  const trimmed = msgs.slice(-(ctxLimit||CFG.CONTEXT_LIMIT)).map(m => ({
    role: m.role,
    content: Array.isArray(m.content) ? m.content : (m.display || m.content)
  }));
  const headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${key}`, ...extraHeaders };
  const res = await fetch(baseURL, {
    method:'POST', headers,
    body: JSON.stringify({ model, max_tokens: maxT||CFG.MAX_TOKENS, messages:[sysPart,...trimmed],
      /* Reasoning models (Nemotron etc.) otherwise burn the whole token
         budget on hidden thoughts — keep effort minimal and never return them. */
      ...(baseURL.includes('openrouter') ? { reasoning: { effort: 'low', exclude: true } } : {}) })
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`API error ${res.status}`); }
  const data = await res.json();
  const _msg = data.choices?.[0]?.message || {};
  let _out = _msg.content;
  if (Array.isArray(_out)) _out = _out.map(c => c?.text || '').join('');
  _out = cleanModelOutput(_out);
  /* If reasoning ate the whole budget, content comes back empty. Only
     salvage text that appears AFTER a fully closed think block — raw,
     unfinished thoughts must never reach the patient. */
  if (!_out && _msg.reasoning) {
    const _parts = String(_msg.reasoning).split(/<\/think>/i);
    _out = _parts.length > 1 ? cleanModelOutput(_parts.pop()) : '';
  }
  return _out || "I'm having trouble responding. Please try again.";
}

/* ── ANTHROPIC DIRECT CALL ── */
async function callAnthropicDirect(msgs, profile, key, ctx, maxT, ctxLimit, model, opts={}) {
  const trimmed = msgs.slice(-(ctxLimit||CFG.CONTEXT_LIMIT)).map(m => ({
    role: m.role,
    content: Array.isArray(m.content) ? m.content.map(c => {
      if (c.type==='image_url') {
        const [meta,data]=c.image_url.url.split(',');
        return { type:'image', source:{ type:'base64', media_type:meta.match(/:(.*?);/)[1], data } };
      }
      return c;
    }) : (m.display||m.content)
  }));
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model, max_tokens:maxT||CFG.MAX_TOKENS, system:buildPrompt(profile,ctx), messages:trimmed })
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`Anthropic error ${res.status}`); }
  const data = await res.json();
  return cleanModelOutput(data.content?.map(b=>b.text||'').join('')) || "I'm having trouble responding. Please try again.";
}

/* ── UNIFIED ROUTER ── */
async function callLEWA(msgs, profile, apiKey, ctx, maxT, ctxLimit, provider, model, opts={}) {
  const _provider = provider || 'gemini';
  const _model    = model    || CFG.MODEL;
  const _key      = apiKey;

  if (_provider==='gemini') {
    return callGemini(msgs, profile, _key, ctx, maxT, _model, opts);
  } else if (_provider==='openrouter') {
    return callOpenAICompat(msgs, profile, _key, ctx, maxT, ctxLimit, _model,
      'https://openrouter.ai/api/v1/chat/completions',
      {'HTTP-Referer':'https://lewa-therapist.app','X-Title':'LEWA Therapist'});
  } else if (_provider==='anthropic') {
    return callAnthropicDirect(msgs, profile, _key, ctx, maxT, ctxLimit, _model, opts);
  } else if (_provider==='openai') {
    return callOpenAICompat(msgs, profile, _key, ctx, maxT, ctxLimit, _model,
      'https://api.openai.com/v1/chat/completions', {});
  } else {
    // Custom — treat as OpenAI-compatible, model field is full URL::model
    const [url, mdl] = _model.split('::');
    return callOpenAICompat(msgs, profile, _key, ctx, maxT, ctxLimit, mdl||url,
      url.startsWith('http') ? url : 'https://'+url, {});
  }
}

/* Credits fetch — only works for OpenRouter */
async function fetchCredits(apiKey, provider) {
  if (provider !== 'openrouter') return null;
  try {
    const res = await fetch('https://openrouter.ai/api/v1/auth/key', { headers:{ Authorization:`Bearer ${apiKey}` } });
    const j = await res.json();
    const d = j.data||{};
    return { used:parseFloat(d.usage||0), limit:d.limit!=null?parseFloat(d.limit):null, remaining:d.limit!=null?parseFloat(d.limit)-parseFloat(d.usage||0):null };
  } catch(_) { return null; }
}

/* ── RENDER BUBBLE TEXT ── */
function Bubble({ msg }) {
  /* Prefer the display text for user messages with attachments */
  const text = msg.display || (typeof msg.content === "string" ? msg.content : msg.content?.find(c=>c.type==="text")?.text || "");
  const parts = text.split(/(\*\*[^*]+\*\*)/);
  return (
    <>
      {parts.map((p,i) => p.startsWith("**")
        ? <strong key={i} style={{color:"#fbbf24",fontWeight:500}}>{p.slice(2,-2)}</strong>
        : p
      )}
      {/* Inline image previews */}
      {msg.attachments?.map((a,i) => a.kind==="image" && a.preview
        ? <div key={i} style={{marginTop:".6rem"}}><img src={a.preview} alt={a.name} style={{maxWidth:"100%",maxHeight:220,borderRadius:8,display:"block"}}/></div>
        : a.kind==="text" ? <div key={i} style={{marginTop:".5rem",fontSize:".75rem",color:"rgba(250,248,242,.55)",background:"rgba(167,139,250,.06)",borderRadius:6,padding:".4rem .6rem"}}>📄 {a.name}</div> : null
      )}
    </>
  );
}

/* ── BREATHING EXERCISE ── */
function BreathingEx({ cfg, onBack }) {
  const [on, setOn] = useState(false);
  const [pi, setPi] = useState(0);
  const [cnt, setCnt] = useState(cfg.phases[0].dur);
  const ref = useRef();
  useEffect(() => {
    if (!on) { clearInterval(ref.current); setPi(0); setCnt(cfg.phases[0].dur); return; }
    ref.current = setInterval(() => {
      setCnt(c => {
        if (c <= 1) {
          setPi(p => { const nx=(p+1)%cfg.phases.length; setTimeout(()=>setCnt(cfg.phases[nx].dur),0); return nx; });
          return 0;
        }
        return c - 1;
      });
    }, 1000);
    return () => clearInterval(ref.current);
  }, [on]);
  const ph = cfg.phases[pi];
  return (
    <div className="ex-panel">
      <div className="ex-panel-header" style={{flexShrink:0}}>
        <button className="btn-back" onClick={onBack}>← Exercises</button>
        <span className="ex-panel-title">{cfg.name}</span>

        <div className="breath-wrap">
          <div className={`breath-circle${on?" "+ph.cls:""}`}>

      <button className="btn-primary" onClick={()=>setOn(r=>!r)}>

      </button>
    </div>
  );
}

/* ── VISUAL GROUNDING ── slow generative calming pattern, rendered on canvas ── */
function VisualGroundingEx({ onBack }) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx2d = canvas.getContext('2d');
    let w, h, t = 0;
    const resize = () => { w = canvas.width = canvas.offsetWidth; h = canvas.height = canvas.offsetHeight; };
    resize();
    window.addEventListener('resize', resize);
    const blobs = [
      { x:0.3, y:0.4, r:0.35, hue:'rgba(0,107,101,' , speed:0.15 },
      { x:0.7, y:0.6, r:0.3,  hue:'rgba(184,149,106,', speed:0.11 },
      { x:0.5, y:0.3, r:0.25, hue:'rgba(0,70,67,'    , speed:0.09 },
    ];
    const draw = () => {
      t += 0.008;
      ctx2d.fillStyle = '#001a19';
      ctx2d.fillRect(0, 0, w, h);
      blobs.forEach((b, i) => {
        const x = (b.x + Math.sin(t * b.speed + i) * 0.12) * w;
        const y = (b.y + Math.cos(t * b.speed * 0.8 + i) * 0.12) * h;
        const r = b.r * Math.min(w, h) * (1 + Math.sin(t + i) * 0.08);
        const grad = ctx2d.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, b.hue + '0.35)');
        grad.addColorStop(1, b.hue + '0)');
        ctx2d.fillStyle = grad;
        ctx2d.beginPath(); ctx2d.arc(x, y, r, 0, Math.PI * 2); ctx2d.fill();
      });
      rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(rafRef.current); window.removeEventListener('resize', resize); };
  }, []);
  return (
    <div className="ex-panel">
      <div className="ex-panel-header"><button className="btn-back" onClick={onBack}>← Exercises</button><span className="ex-panel-title">Visual Grounding</span></div>
      <p style={{color:"rgba(250,248,242,.55)",fontSize:".85rem",lineHeight:1.6,padding:"0 .1rem"}}>
        Let your eyes rest on the slow-moving colour. Breathe with its rhythm — there's nothing else to do here.
      </p>
      <canvas ref={canvasRef} style={{width:"100%",height:280,borderRadius:16,border:"1px solid rgba(240,237,229,.1)"}}/>
    </div>
  );
}

/* ── MOOD RAMP — an upward slope you slide along; the five brand mood
      colors are kept exactly, now as a gradient climbing the incline. ── */
function MoodSlider({ value, onChange }) {
  const svgRef = React.useRef(null);
  const W=340, H=150, X0=30, X1=W-30, Y0=H-38, Y1=30;
  const px = t => X0+(X1-X0)*t, py = t => Y0+(Y1-Y0)*t;
  const t = value==null ? null : value/4;
  const pick = clientX => {
    if (!svgRef.current) return;
    const r = svgRef.current.getBoundingClientRect();
    let tt = ((clientX - r.left)*(W/r.width) - X0)/(X1-X0);
    tt = Math.max(0, Math.min(1, tt));
    const idx = Math.round(tt*4);
    if (idx !== value) { SND.select(); onChange(idx); }
  };
  const onDown = e => { e.preventDefault(); try{svgRef.current.setPointerCapture(e.pointerId);}catch(_){} pick(e.clientX); };
  const onMove = e => { if (e.buttons & 1) pick(e.clientX); };
  const onKey = e => {
    if (e.key==='ArrowRight'||e.key==='ArrowUp')  { e.preventDefault(); const n=Math.min(4,(value??-1)+1); SND.select(); onChange(n); }
    if (e.key==='ArrowLeft' ||e.key==='ArrowDown'){ e.preventDefault(); const n=Math.max(0,(value??1)-1);  SND.select(); onChange(n); }
  };
  return (
    <div>
      <svg ref={svgRef} className="mood-ramp" viewBox={`0 0 ${W} ${H}`} role="slider" tabIndex={0}
        aria-label="Mood" aria-valuemin={1} aria-valuemax={5} aria-valuenow={value==null?undefined:value+1}
        aria-valuetext={value==null?"No mood selected":MOOD_LABELS[value]}
        onPointerDown={onDown} onPointerMove={onMove} onKeyDown={onKey}>
        <defs>
          <linearGradient id="moodGrad" x1={px(0)} y1={py(0)} x2={px(1)} y2={py(1)} gradientUnits="userSpaceOnUse">
            {MOODS.map((c,i)=><stop key={i} offset={i/4} stopColor={c}/>)}
          </linearGradient>
          <filter id="moodGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <line x1={px(0)} y1={py(0)} x2={px(1)} y2={py(1)} stroke="rgba(240,237,229,.14)" strokeWidth="10" strokeLinecap="round"/>
        <line x1={px(0)} y1={py(0)} x2={px(1)} y2={py(1)} stroke="url(#moodGrad)" strokeWidth="10" strokeLinecap="round" opacity={t==null ? .45 : .9}/>
        {MOODS.map((c,i)=>(
          <circle key={i} cx={px(i/4)} cy={py(i/4)} r={value===i?7:4.5} fill={c}
            stroke={value===i?"rgba(240,237,229,.85)":"rgba(0,26,25,.6)"} strokeWidth={value===i?2:1.5}/>
        ))}
        {t!=null && (
          <g filter="url(#moodGlow)">
            <circle cx={px(t)} cy={py(t)} r="13.5" fill={MOODS[value]} stroke="rgba(240,237,229,.9)" strokeWidth="2.5"/>
            <circle cx={px(t)} cy={py(t)} r="4" fill="rgba(240,237,229,.9)"/>
          </g>
        )}
        <text x={px(0)} y={py(0)+26} textAnchor="start" fontSize="9" fill="rgba(240,237,229,.4)" fontFamily="'Lato',sans-serif" fontWeight="700" letterSpacing=".08em">{MOOD_LABELS[0].toUpperCase()}</text>
        <text x={px(1)} y={py(1)-16} textAnchor="end" fontSize="9" fill="rgba(240,237,229,.4)" fontFamily="'Lato',sans-serif" fontWeight="700" letterSpacing=".08em">{MOOD_LABELS[4].toUpperCase()}</text>
      </svg>
      <div className="mood-readout">
        {value==null
          ? <span style={{color:"var(--t3)",fontWeight:400,fontStyle:"italic",fontSize:".8rem"}}>Slide the dot up the ramp to set your mood</span>
          : (<>
              <span style={{display:"inline-block",width:13,height:13,borderRadius:"50%",background:`radial-gradient(circle at 35% 30%, ${MOODS[value]}, ${MOODS[value]}dd)`}}/>
              {MOOD_LABELS[value]}
            </>)}
      </div>
    </div>
  );
}

/* ── SIMPLE SVG MOOD CHART ── */
function MoodChart({ data }) {
  if (data.length < 2) return <div className="empty-msg" style={{padding:"1.5rem"}}>Complete at least 2 check-ins to see your chart.</div>;
  const W=500,H=120,pt=10,pr=15,pb=28,pl=30;
  const iW=W-pl-pr, iH=H-pt-pb;
  const xs=i=>pl+(i/(data.length-1))*iW;
  const ys=v=>pt+iH-((v-1)/4)*iH;
  const path=data.map((d,i)=>`${i===0?"M":"L"} ${xs(i).toFixed(1)} ${ys(d.mood).toFixed(1)}`).join(" ");
  const step=Math.max(1,Math.ceil(data.length/6));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
      {[1,2,3,4,5].map(v=><line key={v} x1={pl} x2={W-pr} y1={ys(v)} y2={ys(v)} stroke="rgba(255,255,255,.05)" strokeWidth="1"/>)}
      {[1,3,5].map(v=><text key={v} x={pl-5} y={ys(v)+4} textAnchor="end" fontSize="9" fill="rgba(250,248,242,.55)">{v}</text>)}
      {data.map((d,i)=>i%step===0?<text key={i} x={xs(i)} y={H-4} textAnchor="middle" fontSize="8" fill="rgba(250,248,242,.55)">{d.date}</text>:null)}
      <path d={path} fill="none" stroke="#008f87" strokeWidth="2.5" strokeLinejoin="round"/>
      {data.map((d,i)=><circle key={i} cx={xs(i)} cy={ys(d.mood)} r="3.5" fill="#008f87"/>)}
    </svg>
  );
}

/* ── ADMIN: AGGREGATE ALL USER DATA ── */
function getAllAccountsSafe() {
  try { return JSON.parse(localStorage.getItem('lewa-accounts') || '[]'); } catch(_) { return []; }
}
function nsKeySafe(ns, k) { return `lewa-${ns}-${k}`; }
function asGetSafe(ns, k) { try { return localStorage.getItem(nsKeySafe(ns,k)); } catch(_) { return null; } }
function getAllUserSessions() {
  const accounts = getAllAccountsSafe();
  const result = [];
  accounts.forEach(acc => {
    const rawIds = asGetSafe(acc.ns, 'session-ids');
    let ids = [];
    try { ids = rawIds ? JSON.parse(rawIds) : []; } catch(_) {}
    ids.forEach(id => {
      try {
        const sess = JSON.parse(asGetSafe(acc.ns, 'sess-'+id));
        if (sess) result.push({ ...sess, userName: acc.name, userAvatar: acc.avatar, userNs: acc.ns });
      } catch(_) {}
    });
  });
  return result.sort((a,b) => new Date(b.date) - new Date(a.date));
}
function getAllUserStats() {
  const accounts = getAllAccountsSafe();
  return accounts.map(acc => {
    let profile = null;
    try { profile = JSON.parse(asGetSafe(acc.ns, 'profile')); } catch(_) {}
    const rawIds = asGetSafe(acc.ns, 'session-ids');
    let sessCount = 0; try { sessCount = rawIds ? JSON.parse(rawIds).length : 0; } catch(_) {}
    const rawHist = asGetSafe(acc.ns, 'hist');
    let ciCount = 0; try { ciCount = rawHist ? JSON.parse(rawHist).length : 0; } catch(_) {}
    return { ...acc, profile, sessCount, ciCount, streak: profile?.streak||0 };
  });
}
