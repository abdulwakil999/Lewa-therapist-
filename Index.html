              })}
          : { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`,'HTTP-Referer':'https://lewa-therapist.app'},
              body: JSON.stringify({model,max_tokens:800,messages:[{role:'system',content:adminPrompt},...newMsgs.map(m=>({role:m.role,content:m.content}))]})}
      );
      const data = await res.json();
      const reply = provider==='gemini'
        ? data.candidates?.[0]?.content?.parts?.[0]?.text
        : data.choices?.[0]?.message?.content;
      setChatMsgs(m=>[...m,{role:'assistant',content:reply||'No response.',time:new Date().toISOString()}]);
    } catch(e) { setChatMsgs(m=>[...m,{role:'assistant',content:'Error: '+e.message,time:new Date().toISOString()}]); }
    setLoading(false);
  };

  const ADMIN_TABS = [['instruct','📋','Instructions'],['patterns','🎨','Patterns'],['notes','📝','Notes'],['api','🔑','API'],['usage','📊','Usage'],['users','👥','Users'],['chat','💬','Direct Chat']];

  return (
    <div className="app">
      <div className="aurora" aria-hidden="true"><span/><span/><span/><span/></div>
      <div style={{height:'100dvh',display:'flex',flexDirection:'column',position:'relative',zIndex:2}}>
        {/* Admin Header */}
        <div style={{background:'rgba(0,38,36,.95)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(240,237,229,.08)',padding:'.9rem 1.4rem',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:'.8rem'}}>
            <div style={{width:34,height:34,background:'linear-gradient(135deg,#b8956a,#d4b48a)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',border:'1px solid rgba(240,237,229,.15)'}}>⚙</div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:'1.05rem',color:'#FAF8F2',fontWeight:400}}>Admin Console</div>
              <div style={{fontSize:'.67rem',color:'rgba(240,237,229,.45)',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:700}}>Professor Poopy Butthole</div>
            </div>
          </div>
          <button onClick={()=>{SND.tap();onSignOut();}} style={{padding:'.35rem .75rem',background:'rgba(240,237,229,.06)',border:'1px solid rgba(240,237,229,.1)',borderRadius:7,color:'rgba(240,237,229,.5)',fontFamily:"'Lato',sans-serif",fontSize:'.72rem',cursor:'pointer',fontWeight:700}}>
            Sign Out
          </button>
        </div>

        {/* Admin Tabs */}
        <div style={{display:'flex',gap:'.4rem',padding:'.7rem 1.4rem',borderBottom:'1px solid rgba(240,237,229,.06)',flexShrink:0,background:'rgba(0,26,25,.6)'}}>
          {ADMIN_TABS.map(([id,ic,lb])=>(
            <button key={id} onClick={()=>{SND.tap();setActiveTab(id);}}
              style={{padding:'.45rem .95rem',background:activeTab===id?'var(--cy)':'rgba(240,237,229,.04)',border:`1px solid ${activeTab===id?'rgba(240,237,229,.15)':'rgba(240,237,229,.08)'}`,borderRadius:8,color:activeTab===id?'#FAF8F2':'rgba(240,237,229,.5)',fontFamily:"'Lato',sans-serif",fontSize:'.78rem',cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',gap:'.4rem',transition:'all .18s'}}>
              {ic} {lb}
            </button>
          ))}
        </div>

        {/* Instructions Tab */}
        {activeTab==='instruct' && (
          <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'1.3rem',display:'flex',flexDirection:'column',gap:'.9rem'}}>
            <div style={{fontSize:'.78rem',color:'rgba(240,237,229,.45)',lineHeight:1.6,background:'rgba(184,149,106,.07)',border:'1px solid rgba(184,149,106,.18)',borderRadius:10,padding:'.8rem 1rem'}}>
              Instructions you add here are injected into LEWA's system prompt for <strong style={{color:'#d4b48a'}}>every user session</strong>. Use this to refine LEWA's behaviour, add new guidelines, or correct patterns you've noticed.
            </div>
            <div style={{display:'flex',gap:'.6rem'}}>
              <textarea value={newInst} onChange={e=>setNewInst(e.target.value)} placeholder="e.g. Always acknowledge cultural background before giving advice…"
                style={{flex:1,background:'rgba(240,237,229,.05)',border:'1px solid rgba(240,237,229,.08)',borderRadius:9,padding:'.7rem .9rem',color:'#FAF8F2',fontFamily:"'Lato',sans-serif",fontSize:'.88rem',resize:'none',outline:'none',minHeight:72,lineHeight:1.55}}
                onFocus={()=>SND.tap()} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addInstruction();}}}/>
              <button onClick={addInstruction} disabled={!newInst.trim()}
                style={{padding:'.6rem 1rem',background:'var(--cy)',border:'1px solid rgba(240,237,229,.12)',borderRadius:9,color:'#FAF8F2',fontFamily:"'Lato',sans-serif",fontSize:'.85rem',cursor:'pointer',fontWeight:700,alignSelf:'flex-start',flexShrink:0,boxShadow:'0 3px 12px rgba(0,0,0,.25)',transition:'all .18s'}}>
                Add
              </button>
            </div>
            {instructions.length===0
              ? <div style={{textAlign:'center',color:'rgba(240,237,229,.28)',fontStyle:'italic',padding:'2rem',fontSize:'.88rem'}}>No instructions yet. Add your first directive above.</div>
              : instructions.map((inst,i)=>(
                <div key={i} style={{background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.08)',borderRadius:10,padding:'.8rem 1rem',display:'flex',gap:'.75rem',alignItems:'flex-start',animation:'fadeUp .3s ease both'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:'.85rem',color:'#FAF8F2',lineHeight:1.6}}>{inst.text}</div>
                    <div style={{fontSize:'.62rem',color:'rgba(240,237,229,.35)',marginTop:'.3rem',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase'}}>Added {new Date(inst.ts).toLocaleDateString()}</div>
                  </div>
                  <button onClick={()=>removeInstruction(i)} style={{background:'rgba(200,100,80,.1)',border:'1px solid rgba(200,100,80,.22)',borderRadius:7,color:'#e8a090',padding:'.3rem .55rem',fontFamily:"'Lato',sans-serif",fontSize:'.72rem',cursor:'pointer',fontWeight:700,flexShrink:0,transition:'all .18s'}}>Remove</button>
                </div>
              ))
            }
          </div>
        )}

        {/* Patterns Tab */}
        {activeTab==='patterns' && (
          <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'1.3rem',display:'flex',flexDirection:'column',gap:'.9rem'}}>
            <div style={{fontSize:'.78rem',color:'rgba(240,237,229,.45)',lineHeight:1.6,background:'rgba(184,149,106,.07)',border:'1px solid rgba(184,149,106,.18)',borderRadius:10,padding:'.8rem 1rem'}}>
              Add conditional response patterns. When a <strong style={{color:'#d4b48a'}}>trigger keyword</strong> appears in a user's message, LEWA follows your custom instruction for that response.
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'.5rem',padding:'1rem',background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.07)',borderRadius:12}}>
              <div className="field-label">Trigger keyword or phrase</div>
              <input style={{background:'rgba(240,237,229,.05)',border:'1px solid rgba(240,237,229,.08)',borderRadius:8,padding:'.6rem .85rem',color:'#FAF8F2',fontFamily:"'Lato',sans-serif",fontSize:'.88rem',outline:'none'}}
                placeholder={'e.g. "anxiety" or "can\'t sleep"'} value={newPatt.trigger}
                onChange={e=>setNewPatt(p=>({...p,trigger:e.target.value}))} onFocus={()=>SND.tap()}/>
              <div className="field-label" style={{marginTop:'.3rem'}}>Custom response instruction</div>
              <textarea style={{background:'rgba(240,237,229,.05)',border:'1px solid rgba(240,237,229,.08)',borderRadius:8,padding:'.6rem .85rem',color:'#FAF8F2',fontFamily:"'Lato',sans-serif",fontSize:'.88rem',resize:'none',outline:'none',minHeight:72,lineHeight:1.55}}
                placeholder='e.g. "Always suggest the 4-7-8 breathing exercise and explain the science behind it briefly."'
                value={newPatt.instruction} onChange={e=>setNewPatt(p=>({...p,instruction:e.target.value}))} onFocus={()=>SND.tap()}/>
              <button onClick={()=>{
                  if(!newPatt.trigger.trim()||!newPatt.instruction.trim()) return;
                  const updated=[...patterns,{...newPatt,ts:new Date().toISOString()}];
                  setPatterns(updated); localStorage.setItem('lewa-admin-patterns',JSON.stringify(updated));
                  setNewPatt({trigger:'',instruction:''}); SND.tap();
                }} disabled={!newPatt.trigger.trim()||!newPatt.instruction.trim()}
                style={{padding:'.55rem 1.1rem',background:'var(--cy)',border:'1px solid rgba(240,237,229,.12)',borderRadius:8,color:'#FAF8F2',fontFamily:"'Lato',sans-serif",fontSize:'.85rem',cursor:'pointer',fontWeight:700,alignSelf:'flex-start',transition:'all .18s'}}>
                Add Pattern
              </button>
            </div>
            {patterns.length===0
              ? <div style={{textAlign:'center',color:'rgba(240,237,229,.28)',fontStyle:'italic',padding:'1.5rem',fontSize:'.85rem'}}>No patterns yet.</div>
              : patterns.map((pat,i)=>(
                <div key={i} style={{background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.07)',borderRadius:10,padding:'.8rem 1rem',animation:'fadeUp .3s ease both'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'.5rem',marginBottom:'.45rem'}}>
                    <div style={{fontSize:'.72rem',color:'var(--cy-ll)',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',background:'rgba(0,107,101,.18)',padding:'.18rem .55rem',borderRadius:20,border:'1px solid rgba(0,143,135,.25)'}}>When: "{pat.trigger}"</div>
                    <button onClick={()=>{
                        const updated=patterns.filter((_,j)=>j!==i);
                        setPatterns(updated); localStorage.setItem('lewa-admin-patterns',JSON.stringify(updated)); SND.delete();
                      }} style={{background:'rgba(200,100,80,.1)',border:'1px solid rgba(200,100,80,.22)',borderRadius:7,color:'#e8a090',padding:'.28rem .5rem',fontFamily:"'Lato',sans-serif",fontSize:'.7rem',cursor:'pointer',fontWeight:700,flexShrink:0,transition:'all .18s'}}>Remove</button>
                  </div>
                  <div style={{fontSize:'.82rem',color:'rgba(240,237,229,.7)',lineHeight:1.6}}>{pat.instruction}</div>
                </div>
              ))
            }
          </div>
        )}

        {/* API Settings Tab */}
        {activeTab==='api' && (
          <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'1.3rem',display:'flex',flexDirection:'column',gap:'.9rem'}}>
            <div style={{fontSize:'.78rem',color:'rgba(240,237,229,.45)',lineHeight:1.6,background:'rgba(184,149,106,.07)',border:'1px solid rgba(184,149,106,.18)',borderRadius:10,padding:'.8rem 1rem'}}>
              Set the API key, provider, and model used by <strong style={{color:'#d4b48a'}}>every user</strong> on this device. This overrides whatever key was set at first launch.
            </div>

            <div style={{display:'flex',flexDirection:'column',gap:'.7rem',padding:'1.1rem',background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.07)',borderRadius:12}}>
              <div>
                <div className="field-label">Provider</div>
                <select className="inp" value={provider} onChange={e=>{SND.tap();setProviderState(e.target.value);setModelState(PROVIDERS[e.target.value]?.models?.[0]||'');}}>
                  {Object.entries(PROVIDERS).map(([k,v])=>(<option key={k} value={k}>{v.label}</option>))}
                </select>
              </div>

              <div>
                <div className="field-label">Model</div>
                {PROVIDERS[provider]?.models?.length > 0 ? (
                  <>
                    <select className="inp" value={model} onChange={e=>{SND.tap();setModelState(e.target.value);}}>
                      {PROVIDERS[provider].models.map(m=><option key={m} value={m}>{MODEL_LABELS[m]||m}</option>)}
                      <option value="__custom">Custom model name…</option>
                    </select>
                    {model==='__custom' && (
                      <input className="inp" style={{marginTop:'-.45rem'}} placeholder="e.g. mistralai/mixtral-8x7b"
                        value={customURLAdmin} onChange={e=>setCustomURLAdmin(e.target.value)} onFocus={()=>SND.tap()}/>
                    )}
                  </>
                ) : (
                  <input className="inp" placeholder="baseURL::modelName" value={customURLAdmin}
                    onChange={e=>setCustomURLAdmin(e.target.value)} onFocus={()=>SND.tap()}/>
                )}
              </div>

              <div>
                <div className="field-label">API Key</div>
                <input className="inp" type="password" placeholder="Paste API key here…" value={apiInputAdmin}
                  onChange={e=>setApiInputAdmin(e.target.value)} onFocus={()=>SND.tap()}
                  onKeyDown={e=>e.key==='Enter'&&verifyAndSaveKey()}/>
                {KEY_SIGNUP_URLS[provider] && (
                  <div style={{fontSize:'.72rem',marginTop:'.3rem'}}>
                    <a href={KEY_SIGNUP_URLS[provider]} target="_blank" rel="noopener noreferrer"
                      onClick={()=>SND.tap()}
                      style={{color:'#5fd4c8',textDecoration:'none',fontWeight:700}}>
                      Don't have a key? Create one on {PROVIDERS[provider]?.label} ↗
                    </a>
                  </div>
                )}
              </div>

              {apiErrAdmin && <div style={{color:'#e8a090',fontSize:'.8rem'}}>{apiErrAdmin}</div>}
              {apiSavedMsg && <div style={{color:'#8fd9b6',fontSize:'.8rem'}}>✓ {apiSavedMsg}</div>}

              <button onClick={verifyAndSaveKey} disabled={!apiInputAdmin.trim()||apiVerifying}
                style={{padding:'.65rem 1.1rem',background:'var(--cy)',border:'1px solid rgba(240,237,229,.12)',borderRadius:9,color:'#FAF8F2',fontFamily:"'Lato',sans-serif",fontSize:'.88rem',cursor:'pointer',fontWeight:700,transition:'all .18s',opacity:(!apiInputAdmin.trim()||apiVerifying)?.5:1}}>
                {apiVerifying ? 'Verifying…' : 'Verify & Save Key'}
              </button>
            </div>

            <div style={{fontSize:'.7rem',color:'rgba(240,237,229,.35)',lineHeight:1.6,padding:'0 .2rem'}}>
              Current active: <strong style={{color:'#d4b48a'}}>{PROVIDERS[provider]?.label||provider}</strong> · <strong style={{color:'#d4b48a'}}>{model}</strong>{apiKey ? ` · Key ending …${apiKey.slice(-4)}` : ' · No key set'}
            </div>
          </div>
        )}

        {/* Usage / Credits Tab */}
        {activeTab==='usage' && (
          <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'1.3rem',display:'flex',flexDirection:'column',gap:'.9rem'}}>
            <div style={{fontSize:'.78rem',color:'rgba(240,237,229,.45)',lineHeight:1.6,background:'rgba(184,149,106,.07)',border:'1px solid rgba(184,149,106,.18)',borderRadius:10,padding:'.8rem 1rem'}}>
              Monitor remaining API credits and overall usage for the currently configured provider.
            </div>

            <div style={{background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.07)',borderRadius:12,padding:'1.1rem'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.8rem'}}>
                <div style={{fontSize:'.68rem',letterSpacing:'.14em',textTransform:'uppercase',color:'rgba(240,237,229,.45)',fontWeight:700}}>
                  {PROVIDERS[provider]?.label||provider} · {model}
                </div>
                <button onClick={()=>{SND.tap();refreshCredits();}} style={{padding:'.3rem .6rem',background:'rgba(240,237,229,.06)',border:'1px solid rgba(240,237,229,.1)',borderRadius:7,color:'rgba(240,237,229,.6)',fontFamily:"'Lato',sans-serif",fontSize:'.7rem',cursor:'pointer',fontWeight:700}}>
                  {creditsLoading ? 'Refreshing…' : '↻ Refresh'}
                </button>
              </div>

              {credits ? (
                <>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'.3rem'}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:'2rem',color:'#d4b48a',fontWeight:400}}>
                      ${credits.remaining!=null?credits.remaining.toFixed(4):'∞'}
                    </div>
                    <div style={{fontSize:'.7rem',color:'rgba(240,237,229,.45)'}}>
                      {credits.limit!=null?`of $${credits.limit.toFixed(2)} max credit`:'No limit set'}
                    </div>
                  </div>
                  {credits.limit!=null && (
                    <div style={{height:6,background:'rgba(240,237,229,.08)',borderRadius:3,overflow:'hidden',marginTop:'.5rem'}}>
                      <div style={{height:'100%',borderRadius:3,width:`${Math.max(0,Math.min(100,(credits.remaining/credits.limit)*100))}%`,background:credits.remaining/credits.limit>0.25?'#008f87':credits.remaining/credits.limit>0.1?'#f59e0b':'#e05c5c'}}/>
                    </div>
                  )}
                  <div style={{fontSize:'.7rem',color:'rgba(240,237,229,.4)',marginTop:'.6rem'}}>
                    ${credits.used.toFixed(4)} used total
                  </div>
                </>
              ) : creditsErr ? (
                <div style={{fontSize:'.82rem',color:'rgba(240,237,229,.5)',lineHeight:1.6}}>{creditsErr}</div>
              ) : (
                <div style={{fontSize:'.82rem',color:'rgba(240,237,229,.35)',fontStyle:'italic'}}>Loading…</div>
              )}
            </div>

            <div style={{background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.07)',borderRadius:12,padding:'1.1rem'}}>
              <div style={{fontSize:'.68rem',letterSpacing:'.14em',textTransform:'uppercase',color:'rgba(240,237,229,.45)',fontWeight:700,marginBottom:'.6rem'}}>Across All Users</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:'.65rem'}}>
                <div style={{background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.07)',borderRadius:10,padding:'.8rem .9rem',textAlign:'center'}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:'1.7rem',color:'#d4b48a',fontWeight:400}}>{getAllAccountsSafe().length}</div>
                  <div style={{fontSize:'.6rem',letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(240,237,229,.4)',marginTop:'.2rem',fontWeight:700}}>Total Users</div>
                </div>
                <div style={{background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.07)',borderRadius:10,padding:'.8rem .9rem',textAlign:'center'}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:'1.7rem',color:'#d4b48a',fontWeight:400}}>{getAllUserSessions().length}</div>
                  <div style={{fontSize:'.6rem',letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(240,237,229,.4)',marginTop:'.2rem',fontWeight:700}}>Total Sessions</div>
                </div>
                <div style={{background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.07)',borderRadius:10,padding:'.8rem .9rem',textAlign:'center'}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:'1.7rem',color:'#d4b48a',fontWeight:400}}>{getAllUserSessions().reduce((s,x)=>s+(x.count||0),0)}</div>
                  <div style={{fontSize:'.6rem',letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(240,237,229,.4)',marginTop:'.2rem',fontWeight:700}}>Total Messages</div>
                </div>
              </div>
              <div style={{fontSize:'.68rem',color:'rgba(240,237,229,.3)',marginTop:'.7rem',lineHeight:1.5}}>
                Per-message token counts are tracked live in each user's sidebar and reset on their page reload — they are not persisted centrally.
              </div>
            </div>
          </div>
        )}

        {/* Users / All Chat Histories Tab */}
        {activeTab==='users' && !viewUserSess && (
          <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'1.3rem',display:'flex',flexDirection:'column',gap:'.9rem'}}>
            <div style={{fontSize:'.78rem',color:'rgba(240,237,229,.45)',lineHeight:1.6,background:'rgba(184,149,106,.07)',border:'1px solid rgba(184,149,106,.18)',borderRadius:10,padding:'.8rem 1rem'}}>
              View every registered user and their saved therapy sessions. Click a session to read the full transcript.
            </div>

            {userStats.length===0 ? (
              <div style={{textAlign:'center',color:'rgba(240,237,229,.28)',fontStyle:'italic',padding:'2rem',fontSize:'.88rem'}}>No users yet.</div>
            ) : userStats.map(u=>(
              <div key={u.ns} style={{background:'rgba(240,237,229,.04)',border:'1px solid rgba(240,237,229,.08)',borderRadius:12,padding:'.9rem 1rem'}}>
                <div style={{display:'flex',alignItems:'center',gap:'.7rem',marginBottom:'.6rem'}}>
                  <div style={{width:34,height:34,background:'var(--cy)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Playfair Display',serif",fontSize:'.95rem',color:'#FAF8F2',flexShrink:0,border:'1px solid rgba(240,237,229,.12)'}}>{u.avatar}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'.9rem',color:'#FAF8F2',fontWeight:700}}>{u.name}</div>
                    <div style={{fontSize:'.63rem',color:'rgba(240,237,229,.4)'}}>Joined {new Date(u.created).toLocaleDateString([],{month:'short',year:'numeric'})}</div>
                  </div>
                  <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap',justifyContent:'flex-end'}}>
                    <span style={{fontSize:'.62rem',padding:'.18rem .5rem',borderRadius:20,background:'rgba(184,149,106,.12)',border:'1px solid rgba(184,149,106,.25)',color:'#d4b48a',fontWeight:700}}>🔥 {u.streak}</span>
                    <span style={{fontSize:'.62rem',padding:'.18rem .5rem',borderRadius:20,background:'rgba(0,107,101,.15)',border:'1px solid rgba(0,143,135,.25)',color:'var(--cy-ll)',fontWeight:700}}>{u.sessCount} sessions</span>
                    <span style={{fontSize:'.62rem',padding:'.18rem .5rem',borderRadius:20,background:'rgba(240,237,229,.06)',border:'1px solid rgba(240,237,229,.1)',color:'rgba(240,237,229,.6)',fontWeight:700}}>{u.ciCount} check-ins</span>
                  </div>
                </div>
                {u.profile?.chiefComplaint && (
                  <div style={{fontSize:'.78rem',color:'rgba(240,237,229,.5)',lineHeight:1.55,fontStyle:'italic',marginBottom:'.6rem'}}>"{u.profile.chiefComplaint}"</div>
                )}
                <div style={{display:'flex',flexWrap:'wrap',gap:'.4rem'}}>
                  {allSessions.filter(s=>s.userNs===u.ns).length===0 ? (
                    <span style={{fontSize:'.72rem',color:'rgba(240,237,229,.3)',fontStyle:'italic'}}>No saved sessions (user may have "save conversations" off)</span>
                  ) : allSessions.filter(s=>s.userNs===u.ns).map(s=>(
                    <button key={s.id} onClick={()=>{SND.tap();setViewUserSess(s);}}
                      style={{padding:'.4rem .7rem',background:'rgba(0,107,101,.1)',border:'1px solid rgba(0,143,135,.22)',borderRadius:8,color:'var(--cy-ll)',fontFamily:"'Lato',sans-serif",fontSize:'.7rem',cursor:'pointer',fontWeight:700,transition:'all .18s'}}>
                      {fmtD(s.date)} · {s.count} msgs
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Viewing a specific user's session transcript */}
        {activeTab==='users' && viewUserSess && (
          <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{padding:'.9rem 1.3rem',borderBottom:'1px solid rgba(240,237,229,.06)',display:'flex',alignItems:'center',gap:'.8rem',flexShrink:0}}>

/* ── ACCOUNT HELPERS ── */
function listAccounts() {
  try { return JSON.parse(localStorage.getItem('lewa-accounts') || '[]'); } catch(_) { return []; }
}
function saveAccounts(arr) { localStorage.setItem('lewa-accounts', JSON.stringify(arr)); }
function nsKey(ns, k) { return `lewa-${ns}-${k}`; }  // namespaced storage

const AccountStore = {
  get : (ns, k)    => { try { return localStorage.getItem(nsKey(ns,k)); } catch(_){ return null; } },
  set : (ns, k, v) => { try { localStorage.setItem(nsKey(ns,k), v); } catch(_){} },
  clear: (ns) => {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(`lewa-${ns}-`)) keys.push(k);
    }
    keys.forEach(k => localStorage.removeItem(k));
  }
};

    prevTherapy:"No",medication:"No",sleep:"3",supportSystem:"Somewhat",lifeEvents:""});

  const bottomRef = useRef(null);
  const taRef     = useRef(null);

  /* Build time-of-day context */
  function buildCtx(locationStr) {
    const now   = new Date();
    const hour  = now.getHours();
    const period = hour < 5 ? "Late Night" : hour < 12 ? "Morning" : hour < 17 ? "Afternoon" : hour < 21 ? "Evening" : "Night";
    const days  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months= [[12,2,"Winter"],[3,5,"Spring"],[6,8,"Summer"],[9,11,"Autumn"]];
    const month = now.getMonth()+1;
    const season = months.find(([s,e])=>month>=s&&month<=e)?.[2] || "Winter";
    const tz    = Intl.DateTimeFormat().resolvedOptions().timeZone;
    return {
      time:     now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
      day:      days[now.getDay()] + ", " + now.toLocaleDateString([],{day:"numeric",month:"long",year:"numeric"}),
      period,
      timezone: tz,
      location: locationStr || "Unknown",
      season
    };
  }

  /* Get location */
  function fetchLocation() {
    const timeCtx = buildCtx("Location not shared");
    setCtx(timeCtx);
    setLocLabel("📍 " + timeCtx.period + " · " + timeCtx.time);
    if (!navigator.geolocation) { setLocLabel("📍 " + timeCtx.time); return; }
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
          const data = await res.json();
          const city    = data.address?.city || data.address?.town || data.address?.village || data.address?.county || "";
          const country = data.address?.country || "";
          const locStr  = [city, country].filter(Boolean).join(", ") || "Unknown location";
          const full    = buildCtx(locStr);
          setCtx(full);
          setLocLabel(`📍 ${city||country} · ${full.period} · ${full.time}`);
        } catch(_) {
          setLocLabel("📍 " + timeCtx.period + " · " + timeCtx.time);
        }
      },
      () => { setLocLabel("📍 " + timeCtx.period + " · " + timeCtx.time); },
      { timeout: 8000, maximumAge: 300000 }
    );
  }

  /* Initial boot — check API key, then show account picker */
  useEffect(() => {
    fetchLocation();
    const tick = setInterval(() => setCtx(c => c ? buildCtx(c.location) : null), 60000);

    /* ── If returning from the OpenRouter "Get a Free Key" redirect, the URL
       will contain ?code=... — exchange it for a real key automatically. ── */
    const urlCode = new URLSearchParams(window.location.search).get('code');
    if (urlCode) {
      setOauthConnecting(true);
      setScreen("apikey");
      completeOpenRouterConnect(urlCode).then(key => {
        window.history.replaceState(null, '', window.location.pathname);
        KeyVault.save(key);
        S.set("lewa-provider", "openrouter");
        S.set("lewa-model", "nvidia/nemotron-3-super-120b-a12b:free");
        setApiKey(key);
        setProvider("openrouter");
        setModel("nvidia/nemotron-3-super-120b-a12b:free");
        fetchCredits(key, "openrouter").then(c => { if(c) setCredits(c); });
        setOauthConnecting(false);
        setScreen("accounts");
      }).catch(e => {
        window.history.replaceState(null, '', window.location.pathname);
        setOauthConnecting(false);
        setOauthErr(e.message || "Could not complete the OpenRouter connection. Please try again or paste a key manually.");
      });
      return () => clearInterval(tick);
    }

    const key = KeyVault.load();
    if (!key) { setTimeout(()=>setScreen("apikey"), 500); return () => clearInterval(tick); }
    setApiKey(key);
    const savedProv = S.get("lewa-provider"); if(savedProv) setProvider(savedProv);
    const savedMdl  = S.get("lewa-model");    if(savedMdl)  setModel(migrateModel(savedMdl));
    fetchCredits(key, savedProv||provider).then(c => { if(c) setCredits(c); });
    setTimeout(()=>setScreen("accounts"), 500);
    return () => clearInterval(tick);
  }, []);

  /* Load user data after account login */
  const loadUserData = (acc) => {
    const un = acc.ns;
    const rawIds = AccountStore.get(un, "session-ids");
    const ids = rawIds ? JSON.parse(rawIds) : [];
    const sid = ids[0] || ("s_" + Date.now());
    setCurrSessId(sid);
    if (!ids.includes(sid)) { ids.unshift(sid); AccountStore.set(un, "session-ids", JSON.stringify(ids)); }
    const list = ids.map(id=>{ try { return JSON.parse(AccountStore.get(un,"sess-"+id)); } catch(_){ return null; } }).filter(Boolean);
    setSessions(list);
    const prov = AccountStore.get(un, "provider"); if(prov) setProvider(prov);
    const mdl  = AccountStore.get(un, "model");    if(mdl)  setModel(migrateModel(mdl));
    const curl = AccountStore.get(un, "customURL"); if(curl) setCustomURL(curl);
    const ws = AccountStore.get(un, "webSearch"); if(ws!=null) setWebSearch(ws==='1');
    const mo = AccountStore.get(un, "memoryOn");  if(mo!=null) setMemoryOn(mo==='1');
    const u = AccountStore.get(un, "profile");
    if (u) {
      try {
        const p = JSON.parse(u);
        setProfile(p); setStreak(p.streak||0); setPlan(p.plan||[]);
        const m = AccountStore.get(un,"msgs"); if(m) setMessages(JSON.parse(m));
        const h = AccountStore.get(un,"hist"); if(h) setHistory(JSON.parse(h));
        const ci = AccountStore.get(un,`ci-${TODAY}`); if(ci) setCiDone(true);
        setScreen("main");
      } catch(_) { setScreen("onboard"); }
    } else {
      /* New account, no therapy profile yet — carry the name they just signed
         up with into the intake form so they don't have to type it twice.
         They can still freely edit it before (or after) starting therapy. */
      setIntake(i => ({ ...i, name: acc.name || "" }));
      setScreen("onboard");
    }
  };

  const handleLogin = (acc) => {
    setAccount(acc);
    if (acc.isAdmin) { setScreen('admin'); return; }
    loadUserData(acc);
  };


  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, aiLoad]);

  /* Namespaced storage helpers (swap to AccountStore once account is set) */
  const ns = account?.ns || 'default';
  const AS = {
    get : k    => AccountStore.get(ns, k),
    set : (k,v)=> AccountStore.set(ns, k, v),
  };
  const saveProfile = p => AS.set("profile", JSON.stringify(p));
  const saveProvider = (p,m,cu) => { AS.set("provider",p); AS.set("model",m); if(cu) AS.set("customURL",cu); };

  /* ── LONG-TERM MEMORY ─────────────────────────────────────────
     When a session ends, LEWA writes itself a short continuity-of-
     care note. Notes + recent check-ins are woven into the system
     prompt of every future conversation, so a new session opens
     with "last time you mentioned…" instead of a blank slate.
     Stored per-account, on this device only. ── */
  const getMemory = () => { try { return JSON.parse(AS.get("memory")||'{"sessions":[]}'); } catch(_){ return {sessions:[]}; } };
  const buildMemoryText = () => {
    if (!memoryOn) return '';
    const lines = [];
    (getMemory().sessions||[]).slice(0,8).forEach(s => lines.push(`[${fmtD(s.date)}] ${s.summary}`));
    const recentCi = history.slice(0,5).map(h => `${fmtD(h.date)}: felt ${MOOD_LABELS[h.mood]}${h.note ? ` — "${h.note.slice(0,80)}"` : ''}`);
    if (recentCi.length) lines.push('Recent daily check-ins → ' + recentCi.join(' · '));
    return lines.join('\n');
  };
  const rememberSession = async (msgs) => {
    if (!memoryOn || !msgs || msgs.filter(m=>m.role==='user').length < 2) return;
    try {
      const transcript = msgs.slice(-24).map(m =>
        `${m.role==='assistant'?'LEWA':'Patient'}: ${(m.display || (typeof m.content==='string' ? m.content : m.content?.find?.(c=>c.type==='text')?.text) || '').slice(0,300)}`
      ).join('\n');
      const ask = `You are writing a private continuity-of-care note for yourself about this session.\n\nSESSION TRANSCRIPT:\n${transcript}\n\nReturn ONLY 3–5 short plain lines (no bullets, no preamble) covering: main topics, the patient's emotional state, any insight or progress, anything the patient asked you to remember, and any plan or homework.`;
      const summary = await callLEWA([{role:'user',content:ask}], profile||{name:'Patient',age:'',chiefComplaint:''}, apiKey, null, 350, 1, provider, model, {webSearch:false});
      const mem = getMemory();
      mem.sessions = [{date:new Date().toISOString(), summary:(summary||'').trim().slice(0,700)}, ...(mem.sessions||[])].slice(0,10);
      AS.set("memory", JSON.stringify(mem));
      setMemTick(t=>t+1);
    } catch(_) {}
  };
  const clearMemory = () => { AS.set("memory",'{"sessions":[]}'); SND.delete(); setMemTick(t=>t+1); };

  /* Session helpers */
  const genId = () => "s_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);

  const persistSession = (sid, msgs) => {
    if (!msgs.length || !sid) return;
    const first = msgs.find(m=>m.role==="assistant");
    const sess = {
      id: sid,
      date: new Date().toISOString(),
      title: "Session — " + new Date().toLocaleDateString([],{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}),
      preview: (first?.content||"").slice(0,100).replace(/\*\*/g,"") + "…",
      count: msgs.length,
      messages: msgs
    };
    AS.set("sess-"+sid, JSON.stringify(sess));
    const rawIds = AS.get("session-ids");
    const ids = rawIds ? JSON.parse(rawIds) : [];
    if (!ids.includes(sid)) { ids.unshift(sid); AS.set("session-ids", JSON.stringify(ids)); }
    const list = ids.map(id=>{ try { return JSON.parse(AS.get("sess-"+id)); } catch(_){ return null; } }).filter(Boolean);
    setSessions(list);
  };

  const deleteSession = id => {
    localStorage.removeItem(nsKey(ns,"sess-"+id));
    const ids = JSON.parse(AS.get("session-ids")||"[]").filter(i=>i!==id);
    AS.set("session-ids", JSON.stringify(ids));
    const list = ids.map(i=>{ try { return JSON.parse(AS.get("sess-"+i)); } catch(_){ return null; } }).filter(Boolean);
    setSessions(list);
    if (viewSess?.id===id) setViewSess(null);
  };

  const startNewSession = () => { SND.open();
    if (messages.length && currSessId) { persistSession(currSessId, messages); rememberSession(messages); }
    const nid = genId();
    const ids = JSON.parse(AS.get("session-ids")||"[]");
    ids.unshift(nid); AS.set("session-ids", JSON.stringify(ids));
    setCurrSessId(nid); setMessages([]); AS.set("msgs","[]");
    setTab("chat"); setViewSess(null); setErrMsg("");
  };

  const saveMsgs = (msgs, sid) => {
    if (!saveConvo) return;                          // skip if user opted out
    AS.set("msgs", JSON.stringify(msgs.slice(-80)));
    if (sid) persistSession(sid, msgs);
  };

  const ii = (k,v) => setIntake(x=>({...x,[k]:v}));
  const intakeOk = intake.name.trim() && intake.age && intake.gender && intake.chiefComplaint.trim();

  /* Verify API key */
  const verifyKey = async () => {
    setApiErr(""); setApiLoading(true);
    const k = apiInput.trim();
    if (!k) { setApiErr("Please enter your API key."); setApiLoading(false); return; }
    const resolvedModel = (model==='__custom') ? (customURL.split('::')[1]||customURL) : model;
    try {
      await callLEWA(
        [{role:'user',content:'Hi',time:new Date().toISOString()}],
        {name:'Test',age:25,gender:'',chiefComplaint:'',prevTherapy:'No',medication:'No',sleep:'3',supportSystem:'',lifeEvents:''},
        k, null, 10, 1, provider, resolvedModel
      );
      KeyVault.save(k);
      S.set("lewa-provider", provider);
      S.set("lewa-model", resolvedModel);
      setApiKey(k);
      setModel(resolvedModel);
      fetchCredits(k, provider).then(c => { if(c) setCredits(c); });
      setApiLoading(false);
      /* First-time setup (no account chosen yet) → go to account picker.
         If already logged in and just swapping providers mid-session → return to main. */
      setScreen(account ? "main" : "accounts");
    } catch(e) {
      setApiErr(e.message || "Invalid key or model. Please check and try again.");
      setApiLoading(false);
    }
  };

  /* Start therapy from intake */
  const startTherapy = async () => {
    const fp = { ...intake, streak:0, plan:[], startDate:new Date().toISOString() };
    setProfile(fp); saveProfile(fp);
    const sid = genId();
    const ids = JSON.parse(AS.get("session-ids")||"[]");
    ids.unshift(sid); AS.set("session-ids", JSON.stringify(ids));
    setCurrSessId(sid);
    setScreen("main"); setTab("chat"); setAiLoad(true); setErrMsg("");
    /* If they changed their name from the one they signed up with, let LEWA
       know so it can notice and acknowledge it naturally, rather than the
       switch happening silently. */
    const accountName = (account?.name || "").trim();
    const intakeName  = intake.name.trim();
    const nameChanged = accountName && accountName.toLowerCase() !== intakeName.toLowerCase();
    const nameNote = nameChanged ? ` (Note: I signed up as "${accountName}" but I'd like to go by "${intakeName}" in our sessions.)` : "";
    try {
      const reply = await callLEWA([{role:"user",content:`Hello. My name is ${intake.name}, I am ${intake.age} years old. My main concern is: ${intake.chiefComplaint}.${nameNote} Please begin our first session.`}], { ...fp, _memory: buildMemoryText() }, apiKey, ctx, 550, 1, provider, model);
      const init = [{role:"assistant",content:reply,time:new Date().toISOString()}];
      setMessages(init); saveMsgs(init, sid);
      setTokensUsed(t => t + estTokens(intake.chiefComplaint) + estTokens(reply));
    } catch(e) { setErrMsg(e.message); }
    setAiLoad(false);
  };

  /* Send chat message */
  const sendMsg = async (overrideText) => {
    const txt = (typeof overrideText === 'string' ? overrideText : input).trim();
    /* Fold in a pending camera frame, if the camera is on and one is ready */
    const camFrame = pendingFrameRef.current;
    const outgoingAttachments = camFrame ? [...attachments, camFrame] : attachments;
    pendingFrameRef.current = null;
    setHasPendingFrame(false);
    if ((!txt && outgoingAttachments.length === 0) || aiLoad) return;
    busyRef.current = true;
    setInput(""); setErrMsg(""); setAttachErr("");
    if (taRef.current) taRef.current.style.height="auto";

    /* Build multimodal content if attachments present */
    let msgContent;
    if (outgoingAttachments.length > 0) {
      const parts = [];
      if (txt) parts.push({ type:"text", text:txt });
      outgoingAttachments.forEach(a => {
        if (a.kind === "image") {
          parts.push({ type:"image_url", image_url:{ url:`data:${a.mime};base64,${a.base64}` } });
        } else {
          parts.push({ type:"text", text:`\n\n[File: ${a.name}]\n${a.text}` });
        }
      });
      msgContent = parts;
    } else {
      msgContent = txt;
    }

    /* Display text for storage (strip base64 to keep localStorage light) */
    const displayText = txt || outgoingAttachments.map(a=>a.kind==="image"?(a.fromCamera?"📷 Camera snapshot":`📎 ${a.name}`):a.text.slice(0,60)+"…").join(" ");
    const uMsg = { role:"user", content:msgContent, display:displayText, attachments:outgoingAttachments.map(a=>({kind:a.kind,name:a.name,preview:a.preview||null,fromCamera:a.fromCamera||false})), time:new Date().toISOString() };
    setAttachments([]);
    const nm = [...messages, uMsg]; setMessages(nm); setAiLoad(true);

    const ctxMsgs = sendHistory ? nm : [uMsg];
    const _web = webSearch ? await bgWebSearch(txt) : ''; // silent lookup while the typing dots show
    const profileWithContext = { ...profile, _cameraActive: cameraOn, _memory: buildMemoryText(), _webResults: _web };
    try {
      const reply = await callLEWA(ctxMsgs, profileWithContext, apiKey, ctx, null, sendHistory ? CFG.CONTEXT_LIMIT : 1, provider, model);
      const aMsg = {role:"assistant",content:reply,time:new Date().toISOString()};
      const final = [...nm, aMsg]; setMessages(final); saveMsgs(final, currSessId);
      SND.receive();
      setTokensUsed(t => t + estTokens(displayText) + estTokens(reply));
      /* Refresh credits after each call */
      fetchCredits(apiKey, provider).then(c => { if(c) setCredits(c); });
      const lines = reply.split("\n").filter(l=>/^\d+[.)]\s/.test(l.trim()));
      if (lines.length >= 2) {
        const p2 = lines.slice(0,5).map(l=>l.replace(/^\d+[.)]\s+/,"").slice(0,90));
        setPlan(p2); const up={...profile,plan:p2}; setProfile(up); saveProfile(up);
      }
      if (callRef.current && aiMutedRef.current) {
        /* AI voice is muted during the call — skip speech and reopen the line */
        setCallState('listening');
        if (!mutedRef.current) callListen();
      } else if (autoRead || voiceMode || callRef.current) {
        setSpeakingId(final.length-1);
        if (callRef.current) setCallState('speaking');
        speakingRef.current = true;
        speakText(reply, ()=>{
          speakingRef.current = false;
          setSpeakingId(null);
          /* Phone-call rhythm: the moment LEWA finishes speaking, the line
             opens again and it listens for you — no button presses. */
          if (callRef.current && !mutedRef.current) { setCallState('listening'); callListen(); }
        }, voiceGender, voiceName);
      }
    } catch(e) {
      setErrMsg(e.message); SND.error();
      if (callRef.current && !mutedRef.current) { setCallState('listening'); setTimeout(callListen, 900); }
    }
    busyRef.current = false;
    setAiLoad(false);
  };

  /* Editing the patient's display name after therapy has already begun.
     Sends a short, natural note into the actual conversation so LEWA
     notices and acknowledges the change, rather than it happening silently. */
  const [editingName, setEditingName] = useState(false);
  const [nameEditValue, setNameEditValue] = useState('');
  const startEditName = () => { setNameEditValue(profile?.name || ''); setEditingName(true); SND.tap(); };
  const saveEditedName = async () => {
    const newName = nameEditValue.trim();
    setEditingName(false);
    if (!newName || newName === profile?.name) return;
    const oldName = profile?.name;
    const up = { ...profile, name: newName };
    setProfile(up); saveProfile(up);
    const noteMsg = { role:"user", content:`(Quick note — please call me "${newName}" from now on instead of "${oldName}".)`, time:new Date().toISOString() };
    const nm = [...messages, noteMsg]; setMessages(nm); setAiLoad(true);
    try {
      const reply = await callLEWA(sendHistory ? nm : [noteMsg], { ...up, _memory: buildMemoryText() }, apiKey, ctx, 400, sendHistory ? CFG.CONTEXT_LIMIT : 1, provider, model);
      const aMsg = { role:"assistant", content:reply, time:new Date().toISOString() };
      const final = [...nm, aMsg]; setMessages(final); saveMsgs(final, currSessId);
      setTokensUsed(t => t + estTokens(noteMsg.content) + estTokens(reply));
    } catch(e) { setErrMsg(e.message); }
    setAiLoad(false);
  };

  /* Fires the voice-mode auto-send on the render AFTER listening ends, so it
     always reads the freshest `input` and calls the freshest `sendMsg` —
     avoiding the stale-closure trap of calling sendMsg directly from inside
     the SpeechRecognition onend callback. */
  useEffect(() => {
    if (!voiceAutoSendPending) return;
    setVoiceAutoSendPending(false);
    if (input.trim()) { SND.send(); sendMsg(); }
  }, [voiceAutoSendPending]);

  /* ── VOICE CALL ENGINE ────────────────────────────────────────
     Feels like a phone call: LEWA listens → thinks → speaks →
     listens again, hands-free, until you hang up. ── */
  const fmtSecs = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const callListen = () => {
    if (!callRef.current || mutedRef.current) return;
    setCallTranscript("");
    let heard = "";
    const rec = createRecognizer({
      onResult: (finalText, interim) => {
        if (finalText) heard += (heard ? " " : "") + finalText.trim();
        setCallTranscript((heard + " " + (interim || "")).trim());
      },
      onEnd: () => {
        if (!callRef.current || mutedRef.current) return;
        if (heard.trim()) { setCallState("thinking"); setCallTranscript(heard.trim()); sendMsg(heard.trim()); }
        else if (!speakingRef.current && !busyRef.current) setTimeout(callListen, 400); // silence — keep the line open
      },
      onError: (err) => {
        if (!callRef.current) return;
        if (err === "not-allowed" || err === "service-not-allowed" || err === "audio-capture") {
          setVoiceErr("Microphone access was blocked — the call ended.");
          endCall();
        }
      },
    });
    if (!rec) return;
    callRecRef.current = rec;
    setCallState("listening");
    try { rec.start(); } catch(_) {}
  };
  const startCall = () => {
    if (!STT_SUPPORTED || !TTS_SUPPORTED) { setVoiceErr("Voice calls need a browser with mic + speech support — try Chrome or Edge."); return; }
    if (!window.isSecureContext) { setVoiceErr("Voice calls need a secure connection (https://) — they will not run when the file is opened directly."); return; }
    stopListening(); stopSpeaking();
    callRef.current = true; mutedRef.current = false; aiMutedRef.current = false;
    setCallMuted(false); setAiMuted(false); setCallActive(true); setVoiceMode(true); setAutoRead(true);
    setCallSecs(0); setCallState("listening"); setVoiceErr("");
    SND.callStart();
    if (callTimerRef.current) clearInterval(callTimerRef.current);
    callTimerRef.current = setInterval(() => setCallSecs(s => s + 1), 1000);
    setTimeout(callListen, 650);
  };
  const endCall = () => {
    if (!callRef.current && !callActive) return;
    callRef.current = false;
    setCallActive(false); setVoiceMode(false); setCallState("idle"); setCallTranscript("");
    if (callTimerRef.current) { clearInterval(callTimerRef.current); callTimerRef.current = null; }
    if (callRecRef.current) { try { callRecRef.current.stop(); } catch(_) {} callRecRef.current = null; }
    stopSpeaking(); setSpeakingId(null); speakingRef.current = false;
    SND.callEnd();
  };
  const toggleCallMute = () => {
    const m = !mutedRef.current;
    mutedRef.current = m; setCallMuted(m); SND.tap();
    if (m) { if (callRecRef.current) { try { callRecRef.current.stop(); } catch(_) {} } setCallTranscript(""); }
    else if (!speakingRef.current && !busyRef.current) callListen();
  };
  /* Mute LEWA's voice mid-call — replies still appear on screen. If LEWA is
     speaking right now, cut it off and reopen the line immediately. */
  const toggleAiMute = () => {
    const m = !aiMutedRef.current;
    aiMutedRef.current = m; setAiMuted(m); SND.tap();
    if (m && speakingRef.current) {
      stopSpeaking(); setSpeakingId(null); speakingRef.current = false;
      if (callRef.current && !mutedRef.current) { setCallState('listening'); callListen(); }
    }
  };

  /* Handle file attachment */
  const handleFile = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setAttachErr("");
    const results = [];
    for (const f of files) {
      try { results.push(await readFileAsync(f)); }
      catch(err) { setAttachErr(err.message); }
    }
    setAttachments(prev => [...prev, ...results].slice(0,5)); // max 5 attachments
    if (fileRef.current) fileRef.current.value = "";
  };

  /* ── Camera control ──
     Nothing is ever saved to disk or localStorage — frames exist only in
     memory for the moment they're attached to an outgoing message. */
  const startCamera = async () => {
    setCameraErr('');
    if (!window.isSecureContext) { setCameraErr('Camera needs a secure connection (https://) to work — it will not run when opened directly as a file, or over plain http://.'); return; }
    if (!navigator.mediaDevices?.getUserMedia) { setCameraErr('Your browser does not support camera access.'); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width:320, height:240 }, audio:false });
      cameraStreamRef.current = stream;
      /* Don't touch videoRef here — the <video> tag only exists in the DOM
         once cameraOn flips true and React re-renders. A useEffect below
         (watching cameraOn) attaches the stream once that element is
         guaranteed to actually exist. */
      setCameraOn(true);
      SND.open();
      /* Periodically capture a frame while the camera stays on — the frame
         is only ever attached to the very next message the person sends. */
      cameraTickRef.current = setInterval(captureFrame, 20000);
      setTimeout(captureFrame, 1200); // first frame shortly after the preview appears
    } catch(e) {
      setCameraErr(e.name === 'NotAllowedError' ? 'Camera permission was denied. You can turn it on anytime from this button.' : 'Could not access your camera.');
    }
  };
  /* Attaches the live stream to the <video> element the moment it exists in
     the DOM — fixes a timing bug where videoRef.current was still null at
     the point startCamera() tried to use it (the element only mounts once
     the cameraOn state change has actually been rendered). */
  useEffect(() => {
    if (cameraOn && videoRef.current && cameraStreamRef.current) {
      videoRef.current.srcObject = cameraStreamRef.current;
      videoRef.current.play().catch(()=>{});
    }
  }, [cameraOn]);
  const stopCamera = () => {
    if (cameraTickRef.current) { clearInterval(cameraTickRef.current); cameraTickRef.current = null; }
    if (cameraStreamRef.current) { cameraStreamRef.current.getTracks().forEach(t=>t.stop()); cameraStreamRef.current = null; }
    pendingFrameRef.current = null;
    setHasPendingFrame(false);
    setCameraOn(false);
    SND.tap();
  };
  const captureFrame = () => {
    if (!videoRef.current || !cameraStreamRef.current) return;
    const v = videoRef.current;
    if (!v.videoWidth) return;
    const canvas = document.createElement('canvas');
    canvas.width = v.videoWidth; canvas.height = v.videoHeight;
    canvas.getContext('2d').drawImage(v, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
    pendingFrameRef.current = { kind:'image', name:'camera.jpg', mime:'image/jpeg', base64: dataUrl.split(',')[1], preview: dataUrl, fromCamera: true };
    setHasPendingFrame(true);
  };

  /* ── Voice input (speech-to-text) ── */
  const startListening = () => {
    if (!STT_SUPPORTED) { setVoiceErr('Voice input is not supported in this browser. Try Chrome or Edge.'); return; }
    if (!window.isSecureContext) { setVoiceErr('Voice input needs a secure connection (https://) — it will not run when opened directly as a file, or over plain http://.'); return; }
    setVoiceErr('');
    const rec = createRecognizer({
      onResult: (finalText, interimText) => {
        if (finalText) setInput(prev => (prev ? prev + ' ' : '') + finalText.trim());
      },
      onEnd: () => {
        setListening(false);
        /* Don't call sendMsg() directly here — this callback was bound when
           listening started and can hold a stale closure over `input`. Instead,
           flag it and let an effect (below) fire the send on the next render,
           which always has the freshest transcribed text. */
        if (voiceMode) setVoiceAutoSendPending(true);
      },
      onError: (err) => {
        setListening(false);
        if (err === 'no-speech' || err === 'aborted') return;
        const msgs = {
          'not-allowed':          'Microphone access was blocked. Check your browser or device settings and try again.',
          'service-not-allowed':  'Microphone access was blocked. Check your browser or device settings and try again.',
          'network':              'A network issue interrupted voice input. Please try again.',
          'audio-capture':        'No microphone was found on this device.',
        };
        setVoiceErr(msgs[err] || 'Could not hear you clearly. Please try again.');
      },
    });
    if (!rec) return;
    recognizerRef.current = rec;
    setListening(true);
    SND.tap();
    try { rec.start(); } catch(_) { setListening(false); }
  };
  const stopListening = () => {
    if (recognizerRef.current) { try { recognizerRef.current.stop(); } catch(_){} }
    setListening(false);
  };

  /* ── Text-to-speech playback for a specific message ── */
  const playMessage = (idx, text) => {
    if (speakingId === idx) { stopSpeaking(); setSpeakingId(null); return; }
    setSpeakingId(idx);
    speakText(text, () => setSpeakingId(null), voiceGender, voiceName);
  };

  /* Lets the person preview a voice before committing to it in settings */
  const previewVoice = (gender) => {
    stopSpeaking();
    speakText("Hi — I'm right here with you. This is how I'll sound.", null, gender, '');
  };

  /* Reusable: stop camera, speech, listening, and ambient sound in one call.
     Used both on unmount and explicitly at every sign-out point, since App
     is a single persistent component and screens are switched via state,
     not by mounting/unmounting — an unmount-only cleanup would never fire
     when someone simply signs out and stays on the page. */
  const stopAllMedia = () => { endCall(); stopCamera(); stopSpeaking(); stopListening(); stopAmbientSoundscape(); };
  useEffect(() => stopAllMedia, []); // safety net for actual unmounts
  useEffect(() => { if (screen !== "main") stopAllMedia(); }, [screen]); // fires on every screen change, including sign-out

  /* Daily check-in */
  const submitCI = async () => {
    if (selMood === null) return;
    setCiLoad(true); setErrMsg("");
    const ciMsg = `Daily check-in — Mood: ${MOOD_LABELS[selMood]} (${selMood+1}/5). ${ciNote.trim()||"No additional notes."}`;
    try {
      const reply = await callLEWA(
        [...messages.slice(-6).map(m=>({role:m.role,content:m.content})),{role:"user",content:ciMsg}],
        { ...profile, _memory: buildMemoryText(), _webResults: webSearch ? await bgWebSearch(ciMsg) : '' }, apiKey, ctx, 550, 7, provider, model
      );
      const ns = streak+1; setStreak(ns);
      AS.set(`ci-${TODAY}`,"1");
      const entry = {date:TODAY,mood:selMood,note:ciNote.trim(),ts:new Date().toISOString()};
      const nh = [entry,...history].slice(0,60); setHistory(nh); AS.set("hist",JSON.stringify(nh));
      const uMsg={role:"user",content:ciMsg,time:new Date().toISOString()};
      const aMsg={role:"assistant",content:reply,time:new Date().toISOString()};
      const final=[...messages,uMsg,aMsg]; setMessages(final); saveMsgs(final, currSessId);
      const up={...profile,streak:ns}; setProfile(up); saveProfile(up);
      setCiDone(true);
      if (autoRead) { setSpeakingId(final.length-1); speakText(reply, ()=>setSpeakingId(null), voiceGender, voiceName); }
    } catch(e) { setErrMsg(e.message); }
    setCiLoad(false);
  };

  /* Clear THIS account's data only — every other account on the device is untouched */
  const clearData = () => {
    if (account && account.ns !== '__admin__') {
      AccountStore.clear(account.ns);                                   // sessions, check-ins, memory, prefs, keys
      saveAccounts(listAccounts().filter(a => a.ns !== account.ns));    // remove it from the sign-in list
    }
    window.location.reload();
  };

  const chartData = history.slice().reverse().map(h=>({date:h.date.slice(5),mood:h.mood+1}));

  /* ── SCREENS ── */
  if (screen==="loading") return (
    <div className="app" style={{alignItems:"center",justifyContent:"center"}}>
      <div className="emblem">🌿</div>
    </div>
  );

  if (screen==="apikey") return (
    <div className="app"><div className="aurora" aria-hidden="true"><span/><span/><span/><span/></div>
      <div className="screen-center">
        <div className="card">
          <div className="emblem">🌿</div>
          <div className="lewa-title">LEWA <em>Therapist</em></div>

          {oauthConnecting ? (

              <p className="lewa-desc" style={{marginBottom:'1.2rem'}}>Finishing your OpenRouter connection…</p>
              <div style={{width:34,height:34,margin:'0 auto',border:'3px solid rgba(240,237,229,.15)',borderTopColor:'#008f87',borderRadius:'50%',animation:'lewa-spin 0.8s linear infinite'}}/>
              <style>{`@keyframes lewa-spin { to { transform: rotate(360deg); } }`}</style>
            </div>
          ) : (<>
            <p className="lewa-desc">Choose your AI provider and model, then enter your API key. Your key stays on this device only.</p>

            {oauthErr && <div style={{color:'#e8a090',fontSize:'.8rem',marginBottom:'.8rem'}}>{oauthErr}</div>}

            <label className="field-label">Provider</label>
            <select className="inp" value={provider} onChange={e=>{SND.tap();setProvider(e.target.value);setModel(PROVIDERS[e.target.value]?.models?.[0]||'');}}>
              {Object.entries(PROVIDERS).map(([k,v])=>(
                <option key={k} value={k}>{v.label}</option>

            </select>

            <label className="field-label">Model</label>
            {PROVIDERS[provider]?.models?.length > 0 ? (
              <>

                  {PROVIDERS[provider].models.map(m=><option key={m} value={m}>{MODEL_LABELS[m]||m}</option>)}

                </select>
                {model==='__custom' && (
                  <input className="inp" style={{marginTop:'-.45rem'}} placeholder="e.g. mistralai/mixtral-8x7b"
                    value={customURL} onChange={e=>setCustomURL(e.target.value)} onFocus={()=>SND.tap()}/>

              </>

              <input className="inp" placeholder="baseURL::modelName"

            {/* Don't have a key? — get one, then come straight back */}
            {provider === 'openrouter' ? (
              <button type="button" onClick={()=>{ SND.tap(); if(canUseOAuthRedirect()) startOpenRouterConnect(); else window.open(KEY_SIGNUP_URLS.openrouter, '_blank'); }}

                {canUseOAuthRedirect() ? "Don't have a key? Get one free →" : "Don't have a key? Create one on OpenRouter ↗"}
              </button>
            ) : KEY_SIGNUP_URLS[provider] ? (
              <button type="button" onClick={()=>{ SND.tap(); window.open(KEY_SIGNUP_URLS[provider], '_blank'); }}
                style={{width:'100%',padding:'.65rem',marginTop:'.2rem',marginBottom:'.9rem',background:'rgba(240,237,229,.05)',border:'1px solid rgba(240,237,229,.1)',borderRadius:9,color:'rgba(240,237,229,.6)',fontFamily:"'Lato',sans-serif",fontSize:'.83rem',fontWeight:700,cursor:'pointer',transition:'all .18s'}}>

            <label className="field-label">API Key</label>
            <input className="inp" type="password" placeholder="Paste your key here…" value={apiInput}

            </button>
            <div style={{fontSize:'.72rem',color:'rgba(240,237,229,.32)',marginTop:'.9rem',lineHeight:1.65,textAlign:'center'}}>

          </>)}

  if (screen==="accounts") return (

            <div>

                <option value="3">3 – Moderate</option><option value="4">4 – Good</option><option value="5">5 – Excellent</option>
              </select>
            </div>
          </div>
          <label className="field-label">Support system</label>
          <select className="inp" value={intake.supportSystem} onChange={e=>ii("supportSystem",e.target.value)}>

          </select>
          <label className="field-label">Significant recent life events (optional)</label>
          <textarea className="inp" rows={2} placeholder="Bereavement, relationship changes, job loss, trauma…" value={intake.lifeEvents} onChange={e=>ii("lifeEvents",e.target.value)}/>
          <div className="nav-row" style={{marginTop:".3rem"}}>
            <button className="btn-back" onClick={()=>setScreen("onboard")}>← Back</button>
            <button className="btn-cont" disabled={!intakeOk} onClick={()=>{SND.open();startTherapy();}}>Begin Therapy →</button>
          </div>
        </div>
      </div>
    </div>
  );

  /* ── MAIN APP ── */
  const TABS = [["chat","💬","Chat"],["exercises","🧘","Skills"],["checkin","📋","Check-in"],["progress","📈","Progress"],["history","🕘","History"]];

  /* Hamburger — only visible on mobile, opens the sidebar as a drawer */
  const menuBtn = (
    <button className="hamburger-btn" aria-label="Open menu" title="Open menu"
      onClick={()=>{SND.tap();setSbOpen(true);}}>☰</button>
  );

  return (
    <div className="app"><div className="aurora" aria-hidden="true"><span/><span/><span/><span/></div>
      <div className="main-layout">

        {/* SIDEBAR (drawer on mobile — opened via the hamburger button) */}
        <div className={"sb-backdrop"+(sbOpen?" show":"")} onClick={()=>setSbOpen(false)}/>
        <div className={"sidebar"+(sbOpen?" open":"")}>
          <div className="sidebar-inner">
            <div className="sb-brand">
              <div className="sb-emblem">🌿</div>
              <div><div className="sb-name">LEWA</div><div className="sb-tag">Clinical AI Therapist</div></div>
              <button className="sb-close" aria-label="Close menu" onClick={()=>{SND.tap();setSbOpen(false);}}>✕</button>
            </div>

            <div><div className="sb-label">Patient</div>
              <div className="sb-box" style={{marginTop:".4rem"}}>
                {editingName ? (
                  <div style={{display:"flex",gap:".4rem",alignItems:"center"}}>
                    <input autoFocus value={nameEditValue} onChange={e=>setNameEditValue(e.target.value)}
                      onKeyDown={e=>{ if(e.key==="Enter") saveEditedName(); if(e.key==="Escape") setEditingName(false); }}
                      style={{flex:1,background:"rgba(240,237,229,.06)",border:"1px solid rgba(0,143,135,.35)",borderRadius:6,
                        padding:".3rem .5rem",color:"#FAF8F2",fontFamily:"'Playfair Display',serif",fontSize:"1rem",outline:"none"}}/>
                    <button onClick={saveEditedName} title="Save" style={{background:"var(--cy)",border:"none",borderRadius:6,color:"#FAF8F2",width:26,height:26,cursor:"pointer",fontSize:".8rem"}}>✓</button>
                  </div>
                ) : (
                  <div className="sb-user-name" onClick={startEditName} title="Tap to change how LEWA addresses you"
                    style={{cursor:"pointer",display:"flex",alignItems:"center",gap:".4rem"}}>
                    {profile?.name}
                    <span style={{fontSize:".62rem",color:"rgba(250,248,242,.3)",fontFamily:"'Lato',sans-serif",fontWeight:600}}>✎ edit</span>
                  </div>
                )}
                <div className="sb-user-sub">{profile?.age} · {profile?.gender}</div>
              </div>
            </div>

            <div><div className="sb-label">Recovery Streak</div>
              <div className="streak-box" style={{marginTop:".4rem"}}>
                <span style={{fontSize:"1.3rem"}}>🔥</span>
                <div><div className="streak-num">{streak}</div><div className="streak-lbl">consecutive days</div></div>
              </div>
            </div>

            {plan.length > 0 && (
              <div><div className="sb-label">Treatment Plan</div>
                <div className="sb-box" style={{marginTop:".4rem"}}>
                  {plan.map((p,i)=>(
                    <div key={i} className="plan-item">
                      <span className="plan-dot">▸</span><span>{p}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div style={{marginTop:"auto"}}>
              <div className="sb-label" style={{marginBottom:".45rem"}}>AI Model</div>
              <div className="sb-box" style={{padding:".6rem .82rem",display:"flex",flexDirection:"column",gap:".5rem",marginBottom:".75rem"}}>
                <div style={{fontSize:".68rem",color:"var(--t3)",fontWeight:700,letterSpacing:".1em",textTransform:"uppercase"}}>{PROVIDERS[provider]?.label||provider}</div>
                <select style={{background:"rgba(240,237,229,.05)",border:"1px solid var(--bdr)",borderRadius:7,padding:".38rem .6rem",color:"var(--t1)",fontFamily:"'Lato',sans-serif",fontSize:".78rem",outline:"none",cursor:"pointer"}}
                  value={model} onChange={e=>{SND.tap();const m=e.target.value;setModel(m);saveProvider(provider,m,customURL);}}>
                  {(PROVIDERS[provider]?.models||[model]).map(m=><option key={m} value={m}>{MODEL_LABELS[m]||m}</option>)}
                </select>
                <button onClick={()=>{SND.tap();setScreen("apikey");}} style={{padding:".35rem .6rem",background:"rgba(240,237,229,.05)",border:"1px solid var(--bdr)",borderRadius:7,color:"var(--t3)",fontFamily:"'Lato',sans-serif",fontSize:".72rem",cursor:"pointer",fontWeight:700,textAlign:"left"}}>

                <Toggle

                  onChange={v=>{SND.toggle();setMemoryOn(v);AS.set('memoryOn',v?'1':'0');}}
                />

              <div className="sb-label" style={{marginTop:".75rem",marginBottom:".45rem"}}>Voice & Audio</div>
              <div className="sb-box" style={{padding:".65rem .82rem"}}>

                <div style={{width:32,height:32,background:"var(--cy)",border:"1px solid rgba(240,237,229,.15)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontSize:"1rem",color:"var(--sd)",flexShrink:0}}>{account?.avatar}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:".82rem",color:"var(--t1)",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{account?.name}</div>
                  <div style={{fontSize:".62rem",color:"var(--t3)"}}>Signed in</div>

      {callActive && (
        <div className={`call-overlay call-${callState}`}>
          <div className="call-avatar-wrap">
            <span className="call-ring"/><span className="call-ring"/><span className="call-ring"/>
            <div className="call-avatar">🌿</div>
          </div>
          <div>
            <div className="call-name">LEWA</div>
            <div className="call-timer">{fmtSecs(callSecs)}</div>
          </div>
          <div className="call-state">
            {callState==="speaking" ? "LEWA is speaking" : callState==="thinking" ? "LEWA is thinking…" : callMuted ? "Microphone muted" : "Listening — take your time"}
          </div>
          <div className="call-transcript">{callTranscript || (callState==="listening" && !callMuted ? "…" : "")}</div>
          <div className="call-controls">
            <button className={"call-btn"+(callMuted?" muted":"")} onClick={toggleCallMute} title={callMuted?"Unmute microphone":"Mute microphone"}>
              {callMuted ? "🔇" : "🎙"}<small>{callMuted?"Unmute":"Mute"}</small>
            </button>
            <button className="call-btn end" onClick={()=>endCall()} title="Hang up">📞<small>End</small></button>
            <button className={"call-btn"+(aiMuted?" muted":"")} title={aiMuted?"Let LEWA speak again":"Silence LEWA's voice — replies still appear as text"}
              onClick={toggleAiMute}>
              {aiMuted ? "🔈" : "🔊"}<small>{aiMuted?"Unmute AI":"Mute AI"}</small>
            </button>
          </div>
        </div>
      )}

      {/* CLEAR DATA CONFIRMATION */}
      {showClear && (
        <ConfirmDialog
          title="Clear this account's data?"
          text="This permanently erases sessions, check-ins, memory and settings for THIS account only. Other accounts on this device are untouched."
          confirmLabel="Yes, Clear Everything"
          danger={true}
          onConfirm={()=>{SND.delete();clearData();}}
          onCancel={()=>{SND.tap();setShowClear(false);}}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
