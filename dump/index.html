<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>LEWACODER</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0a'/><text x='50' y='68' font-size='46' text-anchor='middle' fill='%23f59e0b' font-family='monospace' font-weight='bold'>&lt;/&gt;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;color:#d4d4d4;font-family:'IBM Plex Sans',sans-serif;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
::selection{background:#f59e0b33}
button{font-family:inherit;touch-action:manipulation}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes splashIn{0%{opacity:0;transform:scale(.6)}60%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 18px #f59e0b55}50%{text-shadow:0 0 42px #f59e0bcc}}
@keyframes dotBounce{0%,100%{transform:translateY(0) scale(.85);opacity:.5}50%{transform:translateY(-14px) scale(1.15);opacity:1}}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 #f59e0b55}100%{box-shadow:0 0 0 26px #f59e0b00}}

/* ── Layout ── */
#root{height:100vh;height:100dvh;display:flex;flex-direction:column}
.app{display:flex;height:100vh;height:100dvh;overflow:hidden;position:relative}

/* ── Splash ── */
.splash{height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(ellipse at center,#141005 0%,#0a0a0a 65%)}
.splash-icon{font-family:'JetBrains Mono',monospace;font-size:74px;font-weight:700;color:#f59e0b;letter-spacing:-4px;animation:splashIn .9s ease,glowPulse 2.4s ease-in-out infinite}
.splash-name{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:#f5f5f5;letter-spacing:5px;animation:fadeUp 1s ease .3s both}
.splash-tag{font-size:12px;color:#555;font-family:'JetBrains Mono',monospace;letter-spacing:1px;animation:fadeUp 1s ease .6s both}

/* ── Auth / Setup ── */
.gate{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;padding:20px;overflow-y:auto}
.card{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:14px;padding:28px 26px;width:100%;max-width:440px;animation:fadeUp .45s ease}
.card-top{text-align:center;margin-bottom:24px}
.card-icon{font-size:38px;font-family:'JetBrains Mono',monospace;color:#f59e0b;font-weight:700;letter-spacing:-2px;margin-bottom:10px}
.card-name{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;color:#f5f5f5;margin-bottom:4px;letter-spacing:2px}
.card-sub{font-size:13px;color:#555}
.fg{margin-bottom:14px}
.flabel{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#666;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.finput{width:100%;background:#080808;border:1px solid #1f1f1f;border-radius:7px;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 12px;outline:none;transition:border-color .15s}
.finput:focus{border-color:#f59e0b55}
select.finput{appearance:none;-webkit-appearance:none;cursor:pointer}
textarea.finput{min-height:90px;resize:vertical;line-height:1.6;font-family:'IBM Plex Sans',sans-serif;font-size:13px}
.fhint{font-size:11px;color:#3a3a3a;margin-top:4px;line-height:1.5}
.krow{display:flex;gap:7px}
.krow .finput{flex:1;min-width:0}
.btn-p{width:100%;background:#f59e0b;border:none;border-radius:8px;color:#0a0a0a;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;padding:13px 0;margin-top:6px;transition:opacity .2s}
.btn-p:hover{opacity:.85}
.btn-s{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:6px;color:#777;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 13px;transition:all .15s}
.btn-s:hover{border-color:#2a2a2a;color:#aaa}
.gate-err{color:#f87171;font-size:12px;font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:10px;min-height:15px}
.switch-link{font-size:12px;color:#555;text-align:center;margin-top:16px;font-family:'JetBrains Mono',monospace}
.switch-link span{color:#f59e0b;cursor:pointer;text-decoration:underline}
.auth-tabs{display:flex;gap:6px;margin-bottom:20px}
.auth-tab{flex:1;background:#080808;border:1px solid #1f1f1f;border-radius:7px;color:#555;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 0;transition:all .15s}
.auth-tab.on{border-color:#f59e0b66;color:#f59e0b;background:#110e00}
.p-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* ── Loading dots ── */
.loadwrap{height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;background:radial-gradient(ellipse at center,#141005 0%,#0a0a0a 65%)}
.load-icon{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:700;color:#f59e0b;letter-spacing:-2px;animation:glowPulse 2s ease-in-out infinite}
.polka{display:flex;gap:16px;align-items:center}
.pdot{width:16px;height:16px;border-radius:50%;animation:dotBounce 1.1s ease-in-out infinite}
.load-msg{font-family:'JetBrains Mono',monospace;font-size:11px;color:#666;letter-spacing:2px;animation:pulse 1.6s ease-in-out infinite}

/* ── Sidebar ── */
.sidebar{width:238px;min-width:238px;background:#070707;border-right:1px solid #141414;display:flex;flex-direction:column;overflow:hidden;transition:transform .25s,width .2s,min-width .2s;z-index:40}
.sidebar.closed{width:0;min-width:0;border-right:none}
.sb-backdrop{display:none}
.sb-head{padding:12px 10px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:6px}
.sb-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;letter-spacing:1px;flex:1}
.new-chat{background:#111;border:1px solid #1f1f1f;border-radius:5px;color:#888;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;transition:all .15s;white-space:nowrap}
.new-chat:hover{border-color:#f59e0b44;color:#f59e0b}
.sessions{flex:1;overflow-y:auto;padding:6px}
.session-item{padding:9px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:6px;transition:all .15s;border:1px solid transparent}
.session-item:hover{background:#111;border-color:#1a1a1a}
.session-item.active{background:#110e00;border-color:#f59e0b33;border-left:2px solid #f59e0b}
.session-label{font-size:12px;color:#666;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item.active .session-label{color:#ccc}
.session-del{background:none;border:none;color:#333;cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px;line-height:1;flex-shrink:0}
.session-del:hover{color:#f87171}
.no-sessions{padding:14px 10px;color:#2a2a2a;font-size:11px;font-family:'JetBrains Mono',monospace;text-align:center}
.sb-foot{border-top:1px solid #141414;padding:10px;display:flex;align-items:center;gap:8px}
.sb-user{flex:1;min-width:0}
.sb-uname{font-size:12px;color:#bbb;font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-plan{font-size:10px;color:#444;font-family:'JetBrains Mono',monospace}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:#f59e0b;color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.logout-btn{background:none;border:1px solid #1a1a1a;border-radius:5px;color:#555;cursor:pointer;font-size:11px;padding:5px 8px;font-family:'JetBrains Mono',monospace}
.logout-btn:hover{border-color:#f8717155;color:#f87171}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.header{border-bottom:1px solid #141414;padding:0 12px;height:50px;display:flex;align-items:center;gap:7px;background:#0a0a0a;flex-shrink:0;overflow-x:auto}
.header::-webkit-scrollbar{height:0}
.sb-toggle{background:none;border:none;color:#555;cursor:pointer;padding:6px;font-size:17px;line-height:1;flex-shrink:0}
.sb-toggle:hover{color:#999}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;box-shadow:0 0 8px #f59e0b88;animation:pulse 3s ease-in-out infinite}
.logo-name{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#f5f5f5;letter-spacing:1px}
.h-gap{flex:1}
.h-select{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:5px;color:#999;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 8px;cursor:pointer;outline:none;max-width:190px;text-overflow:ellipsis}
.h-select:hover{border-color:#2a2a2a}
.h-btn{background:none;border:1px solid #1a1a1a;border-radius:5px;color:#555;cursor:pointer;padding:6px 9px;font-size:13px;line-height:1;transition:all .15s;white-space:nowrap;flex-shrink:0}
.h-btn:hover{border-color:#2a2a2a;color:#888}
.h-btn.on{border-color:#f59e0b66;color:#f59e0b;background:#110e00}
.usage-pill{font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b;background:#110e00;border:1px solid #f59e0b33;border-radius:20px;padding:4px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* ── Messages ── */
.msgs{flex:1;overflow-y:auto;padding:20px 14px;-webkit-overflow-scrolling:touch}
.msgs-inner{max-width:820px;margin:0 auto}
.empty{text-align:center;padding-top:60px;animation:fadeUp .5s ease}
.empty-icon{font-size:36px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;color:#f59e0b;letter-spacing:-2px}
.empty-title{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#f0f0f0;margin-bottom:6px}
.empty-sub{color:#444;font-size:13px;margin-bottom:28px}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.chip{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:6px;color:#666;cursor:pointer;font-size:12px;padding:8px 13px;transition:all .2s}
.chip:hover{border-color:#f59e0b66;color:#f59e0b;background:#110e00}
.msg{display:flex;gap:11px;margin-bottom:18px;animation:fadeUp .3s ease}
.msg.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.avatar.user{background:#f59e0b;color:#0a0a0a}
.avatar.ai{background:#111;color:#f59e0b;border:1px solid #222}
.bubble{max-width:80%;padding:11px 14px;font-size:14px;line-height:1.75;color:#ccc;word-break:break-word;min-width:0}
.bubble.user{background:#110e00;border:1px solid #2a1c00;border-radius:12px 2px 12px 12px}
.bubble.ai{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:2px 12px 12px 12px}
.bubble strong{color:#e8e8e8}
.bubble em{color:#a0a0a0}
.bubble .ic{background:#1a1a1a;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#f59e0b;white-space:nowrap}
.bubble .lnk{color:#60a5fa;text-decoration:none}
.msg-meta{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:#333;margin-top:7px;letter-spacing:.3px}
.att-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.att-img{max-width:180px;max-height:140px;border-radius:8px;border:1px solid #2a2a2a;display:block}
.att-file{display:inline-flex;align-items:center;gap:6px;background:#151515;border:1px solid #262626;border-radius:6px;padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#999}
.voice-tag{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b;margin-bottom:5px}

/* ── Code block ── */
.cb{margin:10px 0;border-radius:8px;overflow:hidden;border:1px solid #222;max-width:100%}
.cb-head{display:flex;justify-content:space-between;align-items:center;background:#111;padding:5px 12px;border-bottom:1px solid #1f1f1f}
.cb-lang{font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b;letter-spacing:1px;text-transform:uppercase}
.cb-copy{background:none;border:1px solid #2a2a2a;border-radius:4px;color:#555;cursor:pointer;font-size:11px;padding:2px 8px;font-family:'JetBrains Mono',monospace}
.cb-copy:hover{border-color:#444;color:#999}
.cb-copy.done{color:#4ade80;border-color:#4ade8066}
pre{margin:0;padding:13px 15px;background:#080808;overflow-x:auto;font-size:12.5px;line-height:1.75;font-family:'JetBrains Mono',monospace;color:#e2e8f0;white-space:pre-wrap;word-break:break-word}

/* ── Typing ── */
.typing{display:flex;gap:11px;margin-bottom:18px;align-items:flex-start}
.dots{display:flex;gap:6px;align-items:center;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:2px 12px 12px 12px;padding:14px 16px}
.dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.search-ind{display:flex;align-items:center;gap:7px;padding:6px 12px;background:#0d0d00;border:1px solid #2a1f00;border-radius:6px;margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#f59e0b;animation:fadeIn .3s}
.search-spin{animation:pulse 1s ease-in-out infinite}

/* ── Input ── */
.input-wrap{border-top:1px solid #141414;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:#0a0a0a;flex-shrink:0}
.input-inner{max-width:820px;margin:0 auto}
.pending-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.pend{display:inline-flex;align-items:center;gap:6px;background:#151515;border:1px solid #2a2a2a;border-radius:6px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#aaa;max-width:220px}
.pend img{width:26px;height:26px;object-fit:cover;border-radius:4px}
.pend span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pend button{background:none;border:none;color:#666;cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.pend button:hover{color:#f87171}
.input-box{display:flex;gap:8px;align-items:flex-end;background:#0d0d0d;border:1px solid #1f1f1f;border-radius:12px;padding:10px 12px;transition:border-color .2s}
.input-box:focus-within{border-color:#f59e0b44}
#uinput{flex:1;background:none;border:none;color:#e2e8f0;font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.6;max-height:180px;overflow:auto;resize:none;outline:none;min-width:0}
#uinput::placeholder{color:#333}
.input-btns{display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
.ibtn{background:none;border:1px solid #1f1f1f;border-radius:7px;color:#555;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
.ibtn:hover{border-color:#333;color:#999}
.ibtn.listening{border-color:#f59e0b;color:#f59e0b;animation:pulse 1s ease-in-out infinite}
.send-btn{background:#f59e0b;border:none;border-radius:7px;color:#0a0a0a;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:disabled{background:#1a1a1a;cursor:not-allowed}
.hint{text-align:center;font-size:10px;color:#222;margin-top:6px;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}

/* ── Call overlay ── */
.call-ov{position:fixed;inset:0;background:rgba(5,5,5,.96);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;animation:fadeIn .3s}
.call-circle{width:130px;height:130px;border-radius:50%;background:#110e00;border:2px solid #f59e0b;display:flex;align-items:center;justify-content:center;font-size:46px;animation:ringPulse 1.6s ease-out infinite}
.call-status{font-family:'JetBrains Mono',monospace;font-size:14px;color:#f59e0b;letter-spacing:2px;text-transform:uppercase}
.call-transcript{max-width:520px;width:88%;text-align:center;color:#888;font-size:14px;line-height:1.7;min-height:44px;max-height:32vh;overflow-y:auto;padding:0 10px}
.call-end{background:#dc2626;border:none;border-radius:50%;width:62px;height:62px;color:#fff;font-size:24px;cursor:pointer;transition:transform .15s}
.call-end:hover{transform:scale(1.08)}
.call-hint{font-size:11px;color:#444;font-family:'JetBrains Mono',monospace}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s;padding:14px}
.modal{background:#0d0d0d;border:1px solid #1f1f1f;border-radius:12px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:#0d0d0d;z-index:2}
.m-title{font-family:'JetBrains Mono',monospace;font-size:13px;color:#f0f0f0;font-weight:700}
.m-close{background:none;border:none;color:#444;cursor:pointer;font-size:22px;line-height:1;padding:2px 6px}
.m-close:hover{color:#888}
.m-body{padding:20px}
.sep{border:none;border-top:1px solid #1a1a1a;margin:14px 0}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.mem-on{color:#f59e0b!important;border-color:#f59e0b66!important}

/* ── Usage ── */
.u-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.u-tile{background:#080808;border:1px solid #1f1f1f;border-radius:8px;padding:12px;text-align:center}
.u-num{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:#f59e0b}
.u-lbl{font-size:9.5px;color:#555;font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-top:4px;text-transform:uppercase}
.u-table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:10.5px}
.u-table th{text-align:left;color:#555;padding:6px 8px;border-bottom:1px solid #1a1a1a;font-weight:400;letter-spacing:.5px}
.u-table td{padding:6px 8px;border-bottom:1px solid #141414;color:#999}
.u-table td:first-child{color:#ccc;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-note{font-size:10.5px;color:#3a3a3a;margin-top:12px;line-height:1.6}

/* ── Mobile ── */
@media(max-width:700px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(0);box-shadow:8px 0 30px rgba(0,0,0,.6)}
  .sidebar.closed{transform:translateX(-100%);width:238px;min-width:238px;border-right:1px solid #141414}
  .sb-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:35;animation:fadeIn .2s}
  .sidebar.closed~.sb-backdrop,.sb-backdrop.hide{display:none}
  .bubble{max-width:92%;font-size:14.5px}
  .header{gap:5px;padding:0 8px}
  .h-select{max-width:130px;font-size:10px}
  .logo-name{font-size:12px}
  .msgs{padding:14px 10px}
  .u-grid{grid-template-columns:repeat(2,1fr)}
  .att-img{max-width:140px}
  .empty{padding-top:36px}
  .card{padding:22px 18px}
  .hint{display:none}
  #uinput{font-size:16px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// LEWACODER — AI Coding Workspace
// Accounts · Multi-LLM · Voice calls & notes · Files & images ·
// Usage/cost tracking · Cross-session memory · Mobile-ready
// ═══════════════════════════════════════════════════════════════

// Prices are USD per 1M tokens (input / output) — estimates for cost display.
const PROVIDERS = {
  anthropic: {

async function sha256(t){
  if(crypto.subtle){
    const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));
    return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  let h=0;for(let i=0;i<t.length;i++){h=((h<<5)-h+t.charCodeAt(i))|0;}
  return 'x'+(h>>>0).toString(16);
}

// Build provider-specific message payloads (text + images).
function toAnthropicMsgs(msgs){
  return msgs.map(m=>{
    const imgs=(m.attachments||[]).filter(x=>x.dataUrl);
    if(!imgs.length)return{role:m.role,content:m.content};
    return{role:m.role,content:[
      ...imgs.map(x=>({type:'image',source:{type:'base64',media_type:x.type,data:x.dataUrl.split(',')[1]}})),
      {type:'text',text:m.content||'(see attached image)'},
    ]};
  });
}
function toOpenAIMsgs(msgs){
  return msgs.map(m=>{
    const imgs=(m.attachments||[]).filter(x=>x.dataUrl);
    if(!imgs.length)return{role:m.role,content:m.content};
    return{role:m.role,content:[
      {type:'text',text:m.content||'(see attached image)'},
      ...imgs.map(x=>({type:'image_url',image_url:{url:x.dataUrl}})),
    ]};
  });
}
function toGeminiContents(msgs){
  return msgs.map(m=>{
    const parts=[];
    (m.attachments||[]).filter(x=>x.dataUrl).forEach(x=>parts.push({inlineData:{mimeType:x.type,data:x.dataUrl.split(',')[1]}}));
    parts.push({text:m.content||'(see attached image)'});
    return{role:m.role==='assistant'?'model':'user',parts};
  });
}
function usageFromOpenAI(d){return{tin:d.usage?.prompt_tokens||0,tout:d.usage?.completion_tokens||0};}

async function callAnthropic(msgs,key,model,sys){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model,max_tokens:4096,system:sys,messages:toAnthropicMsgs(msgs)}),
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return{text:d.content?.find(b=>b.type==='text')?.text||'',
    usage:{tin:d.usage?.input_tokens||0,tout:d.usage?.output_tokens||0}};
}
async function callOpenAICompat(url,extraHeaders,msgs,key,model,sys){
  const r=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key,...extraHeaders},
    body:JSON.stringify({model,max_tokens:4096,messages:[{role:'system',content:sys},...toOpenAIMsgs(msgs)]}),
  });
  const d=await r.json();
  if(d.error)throw new Error(typeof d.error==='string'?d.error:d.error.message||'API error');
  return{text:d.choices?.[0]?.message?.content||'',usage:usageFromOpenAI(d)};
}
async function callGemini(msgs,key,model,sys){
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:toGeminiContents(msgs),systemInstruction:{parts:[{text:sys}]},generationConfig:{maxOutputTokens:4096}}),
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return{text:d.candidates?.[0]?.content?.parts?.[0]?.text||'',
    usage:{tin:d.usageMetadata?.promptTokenCount||0,tout:d.usageMetadata?.candidatesTokenCount||0}};
}

async function callAI(msgs,provider,model,sys){
  const k=getKey(provider);
  switch(provider){
    case 'anthropic': return callAnthropic(msgs,k,model,sys);
    case 'openai':    return callOpenAICompat('https://api.openai.com/v1/chat/completions',{},msgs,k,model,sys);
    case 'xai':       return callOpenAICompat('https://api.x.ai/v1/chat/completions',{},msgs,k,model,sys);
    case 'gemini':    return callGemini(msgs,k,model,sys);
    case 'openrouter':return callOpenAICompat('https://openrouter.ai/api/v1/chat/completions',
                        {'HTTP-Referer':'https://lewacoder.app','X-Title':'LEWACODER'},msgs,k,model,sys);

}

function recordUsage(provider,model,usage){
  const a=acct();if(!a)return usage;
  const mi=modelInfo(provider,model);
  const cost=usage.tin/1e6*mi.pin+usage.tout/1e6*mi.pout;
  a.usage.tin+=usage.tin;a.usage.tout+=usage.tout;a.usage.cost+=cost;a.usage.calls++;
  const key=mi.label;
  a.usage.byModel[key]=a.usage.byModel[key]||{tin:0,tout:0,cost:0,calls:0};
  const bm=a.usage.byModel[key];
  bm.tin+=usage.tin;bm.tout+=usage.tout;bm.cost+=cost;bm.calls++;
  saveAccts();
  return{...usage,cost};
}

const trunc=(s,n)=>{s=(s||'').replace(/\s+/g,' ').trim();return s.length>n?s.slice(0,n)+'…':s;};
function buildRecall(){
  const a=acct();if(!a)return'';
  const others=a.sessions.filter(s=>s.id!==a.currentId&&s.messages.length);
  let budget=1800;const out=[];
  for(const s of others.slice(0,12)){
    const fu=s.messages.find(m=>m.role==='user');
    const la=[...s.messages].reverse().find(m=>m.role==='assistant');
    let e=`• [${trunc(s.title,40)}] asked: ${trunc(fu?.content,110)}`;
    if(la)e+=` — you answered: ${trunc(la.content,150)}`;
    if(budget-e.length<0)break;
    budget-=e.length;out.push(e);
  }
  return out.join('\n');
}

async function webSearch(q){
  try{
    const ddg=`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=1`;
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(ddg)}`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok)throw new Error('proxy error');
    const d=await r.json();
    const parts=[];
    if(d.AbstractText)parts.push(d.AbstractText);
    if(d.Answer)parts.push('Quick answer: '+d.Answer);
    (d.RelatedTopics||[]).slice(0,4).forEach(t=>t.Text&&parts.push('• '+t.Text));
    return parts.length?`[Web results for "${q}"]:\n${parts.join('\n')}`:`[No web results for "${q}"]`;
  }catch(e){return `[Web search unavailable: ${e.message}]`;}
}

function speak(text,onend){
  if(!window.speechSynthesis){if(onend)onend();return;}
  window.speechSynthesis.cancel();
  const clean=text.replace(/```[\s\S]*?```/g,' — code block — ').replace(/[#*`_~>|]/g,'').trim();
  const u=new SpeechSynthesisUtterance(clean.slice(0,1200));
  u.rate=1.02;u.pitch=1;
  if(onend){u.onend=onend;u.onerror=onend;}
  window.speechSynthesis.speak(u);
}
function stopTTS(){if(window.speechSynthesis)window.speechSynthesis.cancel();}

// ── Voice note (STT → auto-send) ───────────────────────────────
function sttSupported(){return !!(window.SpeechRecognition||window.webkitSpeechRecognition);}
function startSTT(){
  if(!sttSupported()){alert('Voice input not supported here. Use Chrome or Edge.');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  S.recognition=new SR();
  S.recognition.lang='en-US';
  S.recognition.continuous=true;
  S.recognition.interimResults=true;
  let finalText='';
  S.recognition.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)finalText+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    const ta=document.getElementById('uinput');
    if(ta){ta.value=(finalText+interim).trim();autoResize(ta);}
  };
  S.recognition.onerror=()=>{S.listening=false;updateMic();};
  S.recognition.onend=()=>{
    S.listening=false;updateMic();
    const t=finalText.trim();
    if(t){const ta=document.getElementById('uinput');if(ta)ta.value=t;sendMsg(true);}
  };
  S.recognition.start();
  S.listening=true;updateMic();
}
function stopSTT(){if(S.recognition){try{S.recognition.stop();}catch{}S.recognition=null;}S.listening=false;updateMic();}
function toggleSTT(){if(S.listening){S.recognition&&S.recognition.stop();}else startSTT();}
function updateMic(){
  const b=document.getElementById('mic-btn');

// ── Voice call mode (hands-free loop) ──────────────────────────
function startCall(){
  if(!sttSupported()){alert('Voice calls need Chrome or Edge (Web Speech API).');return;}
  stopSTT();
  S.call={status:'listening',transcript:''};
  render();callListen();
}
function callListen(){
  if(!S.call)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR();
  S.recognition=rec;
  rec.lang='en-US';rec.continuous=false;rec.interimResults=true;
  let heard='';
  rec.onresult=e=>{
    heard='';
    for(let i=0;i<e.results.length;i++)heard+=e.results[i][0].transcript;
    if(S.call){S.call.transcript=heard;updateCallUI();}
  };
  rec.onerror=()=>{if(S.call)setTimeout(callListen,600);};
  rec.onend=async()=>{
    if(!S.call)return;
    const text=heard.trim();
    if(!text){setTimeout(callListen,400);return;}
    S.call.status='thinking';S.call.transcript=text;updateCallUI();
    const reply=await callSendVoice(text);
    if(!S.call)return;
    if(reply){
      S.call.status='speaking';S.call.transcript=trunc(reply,420);updateCallUI();
      speak(reply,()=>{if(S.call){S.call.status='listening';S.call.transcript='';updateCallUI();callListen();}});
    }else{S.call.status='listening';updateCallUI();callListen();}
  };
  try{rec.start();}catch{}
}
async function callSendVoice(text){
  const a=acct();if(!a)return null;
  if(!a.currentId||!curSess())newSess();
  const sess=curSess();
  sess.messages.push({role:'user',content:text,voice:true});
  if(sess.title==='New Chat')sess.title='📞 '+trunc(text,40);
  saveAccts();
  try{
    const sys=SYS(a.memory,buildRecall());
    const res=await callAI(sess.messages,sess.provider,sess.model,sys);
    const u=recordUsage(sess.provider,sess.model,res.usage.tin?res.usage:{tin:estTokens(text),tout:estTokens(res.text)});
    sess.messages.push({role:'assistant',content:res.text,meta:u});
    saveAccts();
    return res.text;
  }catch(err){
    sess.messages.push({role:'assistant',content:`❌ **Error:** ${err.message}`});
    saveAccts();
    return 'Sorry, there was an error: '+err.message;
  }
}
function endCall(){
  if(S.recognition){try{S.recognition.abort?S.recognition.abort():S.recognition.stop();}catch{}S.recognition=null;}
  stopTTS();
  if(S.call){S.call=null;render();}
}
function updateCallUI(){
  const st=document.getElementById('call-status'),tr=document.getElementById('call-transcript'),ic=document.getElementById('call-icon');
  if(!S.call)return;
  if(st)st.textContent={listening:'Listening…',thinking:'Thinking…',speaking:'Speaking…'}[S.call.status];
  if(tr)tr.textContent=S.call.transcript||(S.call.status==='listening'?'Say something — I\'m listening':'');
  if(ic)ic.textContent={listening:'🎙️',thinking:'💭',speaking:'🔊'}[S.call.status];
}

const MAX_IMG=4*1024*1024, MAX_TEXT=300*1024;
function pickFiles(){document.getElementById('file-input').click();}
async function onFiles(input){
  const files=[...(input.files||[])];
  input.value='';
  for(const f of files){
    const att={name:f.name,type:f.type||'application/octet-stream',size:f.size};
    if(f.type.startsWith('image/')&&f.size<=MAX_IMG){
      att.dataUrl=await readAsDataURL(f);
    }else if(f.size<=MAX_TEXT&&looksTexty(f)){
      try{att.text=(await f.text()).slice(0,60000);}catch{}
    }
    S.pending.push(att);
  }
  renderPending();
}
function looksTexty(f){
  if(f.type.startsWith('text/'))return true;
  if(/json|xml|javascript|yaml|csv|svg|x-sh|x-python/.test(f.type))return true;
  return /\.(txt|md|js|jsx|ts|tsx|py|c|cpp|h|hpp|java|cs|go|rs|rb|php|html|css|scss|json|xml|yml|yaml|toml|ini|cfg|conf|sh|bash|sql|csv|log|env|lock|gitignore)$/i.test(f.name);
}
const readAsDataURL=(f)=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});
function removePending(i){S.pending.splice(i,1);renderPending();}
function renderPending(){
  const el=document.getElementById('pending');
  if(!el)return;
  el.innerHTML=S.pending.map((a,i)=>`<div class="pend">
    ${a.dataUrl?`<img src="${a.dataUrl}" alt="">`:'📎'}
    <span>${esc(a.name)}</span>
    <button onclick="removePending(${i})">✕</button>
  </div>`).join('');
}
const fmtSize=(n)=>n>=1e6?(n/1e6).toFixed(1)+' MB':n>=1e3?(n/1e3).toFixed(0)+' KB':n+' B';

// ── Markdown / code rendering ──────────────────────────────────
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderMD(text){
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`\n]+)`/g,'<code class="ic">$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" class="lnk">$1</a>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<strong style="display:block;margin:6px 0 2px;color:#e8e8e8;font-size:15px">$1</strong>')
    .replace(/^[•\-\*]\s+(.+)$/gm,'<span style="display:block;padding-left:12px">• $1</span>')
    .replace(/^(\d+)\.\s+(.+)$/gm,'<span style="display:block;padding-left:12px">$1. $2</span>')
    .replace(/\n/g,'<br>');
}
function parseMsgContent(text){
  const parts=[];const re=/```(\w*)\n?([\s\S]*?)```/g;let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push({t:'text',v:text.slice(last,m.index)});
    parts.push({t:'code',lang:m[1]||'text',v:m[2].trim()});
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push({t:'text',v:text.slice(last)});
  return parts;
}
function renderParts(parts){
  return parts.map(p=>{
    if(p.t==='code')return `<div class="cb">
      <div class="cb-head"><span class="cb-lang">${esc(p.lang)}</span>
      <button class="cb-copy" data-code="${esc(encodeURIComponent(p.v))}">copy</button></div>
      <pre><code>${esc(p.v)}</code></pre></div>`;
    return `<div style="margin:4px 0">${renderMD(p.v)}</div>`;
  }).join('');
}

}

  const isU=m.role==='user';
  const atts=m.attachments||[];
  const attHtml=atts.length?`<div class="att-strip">${atts.map(a=>
    a.dataUrl?`<img class="att-img" src="${a.dataUrl}" alt="${esc(a.name)}">`
    :`<span class="att-file">📎 ${esc(a.name)} · ${fmtSize(a.size||0)}</span>`).join('')}</div>`:'';
  const meta=m.meta&&(m.meta.tin||m.meta.tout)?`<div class="msg-meta">${fmtTok(m.meta.tin)} in · ${fmtTok(m.meta.tout)} out · ${fmtCost(m.meta.cost||0)}</div>`:'';
  return `<div class="msg ${isU?'user':''}">
    <div class="avatar ${isU?'user':'ai'}">${isU?'U':'AI'}</div>
    <div class="bubble ${isU?'user':'ai'}">
      ${m.voice?'<div class="voice-tag">🎙️ voice</div>':''}
      ${attHtml}${renderParts(parseMsgContent(m.content))}${meta}

}

// ── Handlers ───────────────────────────────────────────────────
function showHide(id){const el=document.getElementById(id);if(el)el.type=el.type==='password'?'text':'password';}
function openModal(m){S.modal=m;render();}
function closeModal(){S.modal=null;render();}
function overlayClick(e){if(e.target===e.currentTarget)closeModal();}

function saveKeys(){
  const a=acct();
  Object.keys(PROVIDERS).forEach(id=>{
    const el=document.getElementById('key-'+id);
    if(el)a.apiKeys[id]=el.value.trim();
  });
  saveAccts();closeModal();
}
function saveMem(){const a=acct();const el=document.getElementById('mem-input');if(el)a.memory=el.value.trim();saveAccts();closeModal();}
function clearMem(){acct().memory='';saveAccts();closeModal();}
function resetUsage(){
  if(!confirm('Reset token & cost counters?'))return;
  acct().usage={tin:0,tout:0,cost:0,calls:0,byModel:{}};
  saveAccts();render();
}
function clearAllData(){
  if(!confirm(`Delete account "${S.user}" with all chats, keys and memory? This cannot be undone.`))return;
  delete S.accounts[S.user];
  sv(AK,S.accounts);localStorage.removeItem(UK);
  S.user=null;S.screen='auth';S.authMode='signup';S.modal=null;render();
}

function changeModel(v){
  const [p,m]=v.split('::');
  const a=acct();
  a.cfg.provider=p;a.cfg.model=m;
  const sess=curSess();
  if(sess){sess.provider=p;sess.model=m;}
  saveAccts();
  if(!a.apiKeys[p]||!a.apiKeys[p].trim()){S.modal='settings';}
  render();
}
function toggleWS(){const a=acct();a.cfg.webSearch=!a.cfg.webSearch;saveAccts();render();}
function toggleTTS(){const a=acct();a.cfg.tts=!a.cfg.tts;if(!a.cfg.tts)stopTTS();saveAccts();render();}
function toggleSB(){const a=acct();a.cfg.sbOpen=!a.cfg.sbOpen;saveAccts();render();}
function doNewChat(){newSess();if(window.innerWidth<=700)acct().cfg.sbOpen=false;render();}
function switchSess(id){
  const a=acct();a.currentId=id;
  const s=curSess();
  if(s){a.cfg.provider=s.provider;a.cfg.model=s.model;}
  if(window.innerWidth<=700)a.cfg.sbOpen=false;
  saveAccts();render();
}
function delSess(e,id){
  e.stopPropagation();
  if(!confirm('Delete this chat?'))return;
  const a=acct();
  a.sessions=a.sessions.filter(s=>s.id!==id);
  if(a.currentId===id)a.currentId=a.sessions[0]?.id||null;
  saveAccts();render();
}
function useChip(text){const ta=document.getElementById('uinput');if(ta){ta.value=text;ta.focus();autoResize(ta);}}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

// Copy buttons (delegated)
document.addEventListener('click',e=>{
  if(e.target.classList.contains('cb-copy')){
    const code=decodeURIComponent(e.target.dataset.code||'');
    navigator.clipboard.writeText(code).then(()=>{
      e.target.textContent='✓ copied';e.target.classList.add('done');
      setTimeout(()=>{e.target.textContent='copy';e.target.classList.remove('done');},1800);
    });
  }
});

// ── Send message ───────────────────────────────────────────────
function attachmentContext(atts){
  const parts=[];
  for(const a of atts){
    if(a.text)parts.push(`--- Attached file: ${a.name} (${a.type}) ---\n${a.text}\n--- end of ${a.name} ---`);
    else if(!a.dataUrl)parts.push(`[User attached a file: ${a.name}, type ${a.type}, ${fmtSize(a.size||0)} — binary content not inlined]`);
  }
  return parts.join('\n\n');
}

async function sendMsg(isVoice){
  const ta=document.getElementById('uinput');
  if(!ta)return;
  const text=ta.value.trim();
  if((!text&&S.pending.length===0)||S.loading)return;

  const a=acct();
  if(!a.currentId||!curSess())newSess();
  const sess=curSess();

  const atts=S.pending;S.pending=[];
  ta.value='';ta.style.height='auto';

  const fileCtx=attachmentContext(atts);
  const content=text+(fileCtx?(text?'\n\n':'')+fileCtx:'');
  sess.messages.push({role:'user',content:content||'(attached files)',attachments:atts,voice:!!isVoice});
  if(sess.title==='New Chat')sess.title=(isVoice?'🎙️ ':'')+trunc(text||atts[0]?.name||'Files',45);

  S.loading=true;saveAccts();render();

  try{
    let apiMsgs=[...sess.messages];
    if(a.cfg.webSearch&&text){
      const ind=document.getElementById('search-ind');
      if(ind)ind.innerHTML='<div class="search-ind"><span class="search-spin">🔍</span> Searching the web…</div>';
      const results=await webSearch(text);
      if(ind)ind.innerHTML='';
      if(results&&!results.includes('[Web search unavailable')){
        const lastIdx=apiMsgs.length-1;
        apiMsgs=[...apiMsgs.slice(0,lastIdx),{...apiMsgs[lastIdx],content:apiMsgs[lastIdx].content+'\n\n'+results}];
      }
    }
    const sys=SYS(a.memory,buildRecall());
    const res=await callAI(apiMsgs,sess.provider,sess.model,sys);
    const usage=res.usage.tin||res.usage.tout?res.usage:{tin:estTokens(content),tout:estTokens(res.text)};
    const u=recordUsage(sess.provider,sess.model,usage);
    sess.messages.push({role:'assistant',content:res.text,meta:u});
    S.loading=false;saveAccts();render();
    if(a.cfg.tts)speak(res.text);
  }catch(err){
    S.loading=false;
    sess.messages.push({role:'assistant',content:`❌ **Error:** ${err.message}`});
    saveAccts();render();
  }
}

// ── Init ───────────────────────────────────────────────────────
function init(){
  render(); // splash
  setTimeout(()=>{
    if(S.user&&S.accounts[S.user]){startLoading();}
    else{S.user=null;S.screen='auth';render();}
  },2200);
}
init();
